let admSelUid='';
function adminPlayersHtml(){
  if(!boardData.length)return `<div class="nf-empty">جارٍ تحميل اللاعبين... افتح «الترتيب العام» مرة ثم ارجع.</div>`;
  const opts=boardData.map(p=>`<option value="${p.uid}" ${p.uid===admSelUid?'selected':''}>${esc(p.name)} (${p.total} نقطة)</option>`).join('');
  let h=`<div class="adm-field"><label>اختر لاعباً:</label>
    <select onchange="admSelUid=this.value;renderAdmin()"><option value="">— اختر —</option>${opts}</select></div>`;
  if(!admSelUid)return h;
  const p=boardData.find(x=>x.uid===admSelUid);if(!p)return h;
  const cp=computePointsForG(p.g,p.champ,p.ko);
  // تعديل الاسم
  h+=`<div class="adm-field"><label>الاسم:</label>
    <div class="adm-inline"><input id="admName" value="${esc(p.name)}">
    <button class="adm-btn" onclick="adminSaveName()">حفظ</button></div></div>`;
  // الحالة (تعديل/مسح)
  h+=`<div class="adm-field"><label>✍️ الحالة:</label>
    <div class="adm-inline"><input id="admStatus" maxlength="60" placeholder="(فاضية)" value="${esc(p.status||'')}">
    <button class="adm-btn" onclick="adminSaveStatus()">حفظ</button>
    <button class="adm-btn danger" onclick="adminClearStatus()">مسح</button></div></div>`;
  // علم/ملاحظة + تجميد + حذف
  const fobj=admFlags[p.uid]||{};
  h+=`<div class="adm-field"><label>🚩 ملاحظة/علم (للمتابعة):</label>
    <div class="adm-inline"><input id="admNote" placeholder="ملاحظة..." value="${esc(fobj.note||'')}">
    <button class="adm-btn" onclick="adminSaveFlag()">${fobj.flagged?'محفوظ':'حفظ'}</button></div></div>
  <div class="adm-toggles">
    <button class="adm-tgl ${fobj.frozen?'on':''}" onclick="adminToggleFreeze(${!fobj.frozen})">${fobj.frozen?'🔒 مجمّد (فك)':'🔓 تجميد التوقّع'}</button>
    <button class="adm-tgl danger" onclick="adminDeletePlayer()">🗑️ حذف الحساب</button>
  </div>`;
  // تفصيل النقاط (من وين جت)
  const baseP=cp.total-cp.jokerBonus-cp.streakBonus-cp.champBonus;
  h+=`<div class="adm-sec">📊 من وين جت نقاطه</div>
    <div class="adm-bd">
      <div class="adm-bd-row"><span>نقاط التوقّعات</span><span>${baseP}</span></div>
      ${cp.jokerBonus?`<div class="adm-bd-row gold"><span>🃏 بونص الجوكر</span><span>+${cp.jokerBonus}</span></div>`:''}
      ${cp.streakBonus?`<div class="adm-bd-row gold"><span>🔥 بونص السلسلة</span><span>+${cp.streakBonus}</span></div>`:''}
      ${cp.champBonus?`<div class="adm-bd-row gold"><span>🏆 بونص البطل</span><span>+${cp.champBonus}</span></div>`:''}
      <div class="adm-bd-row total"><span>الإجمالي</span><span>${cp.total}</span></div>
    </div>
    <div class="adm-bd-note">🎯 ${cp.exact} مطابقة تامة · ✅ ${cp.good} قريبة · ➕ ${cp.ok} اتجاه صحيح · ❌ ${cp.wrong} خطأ</div>
  `;
  // توقّعاته
  h+=`<div class="adm-sec">توقّعاته (${p.scored} محتسبة · ${p.exact} مطابقة)</div>`;
  const preds=GM.filter(m=>counts(m)&&p.g[m.id]&&p.g[m.id].h!=null&&p.g[m.id].h!=='');
  if(!preds.length)h+=`<div class="nf-empty">ما عنده توقّعات.</div>`;
  else h+=preds.map(m=>{
    const pr=p.g[m.id];const rec=liveFor(m.A,m.B);const fin=rec&&rec.status==='post';
    let res='';if(fin){const aS=scoreFor(rec,m.A),bS=scoreFor(rec,m.B);if(aS!=null)res=`<span class="adm-res">${aS}-${bS}</span>`;}
    const jok=pr.j?'<span class="adm-jok">🃏</span>':'';
    const ptsV=cp.per[m.id];
    const ptsTag=(fin&&ptsV!=null)?`<span class="adm-pts p${ptsV>=5?5:ptsV>=3?3:ptsV>=1?2:0}">+${ptsV}</span>`:'';
    return `<div class="adm-pred">
      <span class="adm-pmatch">${fl(m.A)}${nm(m.A)} × ${nm(m.B)}${fl(m.B)}</span>
      <span class="adm-pval">${pr.h}-${pr.a}${jok} ${res}</span>
      ${ptsTag}
      <span class="adm-pacts">
        ${pr.j?`<button class="adm-mini" onclick="adminDelJoker('${m.id}')" title="مسح الجوكر">🃏✕</button>`:''}
        <button class="adm-mini del" onclick="adminDelPred('${m.id}','${esc(nm(m.A))} × ${esc(nm(m.B))}')" title="مسح التوقّع">🗑️</button>
      </span></div>`;
  }).join('');
  return h;
}

function adminToolsHtml(){
  // إحصائيات سريعة
  const np=boardData.length;
  let totPreds=0,sumPts=0,active=null;
  boardData.forEach(p=>{totPreds+=p.predTotal||0;sumPts+=p.total;if(!active||(p.predTotal||0)>(active.predTotal||0))active=p;});
  const avg=np?Math.round(sumPts/np):0;
  let h=`<div class="adm-stats">
    <div class="ast"><div class="ast-n num">${np}</div><div class="ast-l">لاعب</div></div>
    <div class="ast"><div class="ast-n num">${totPreds}</div><div class="ast-l">توقّع</div></div>
    <div class="ast"><div class="ast-n num">${avg}</div><div class="ast-l">متوسط النقاط</div></div>
  </div>
  ${active?`<div class="adm-note">⚡ الأنشط: <b>${esc(active.name)}</b> (${active.predTotal} توقّع)</div>`:''}`;
  // أزرار الأدوات
  h+=`<div class="adm-sec">إجراءات</div>
    <button class="adm-btn full" style="margin-bottom:8px" onclick="adminRefreshNow()">🔄 تحديث النتائج فوراً (ESPN)</button>
    <button class="adm-btn full" style="margin-bottom:8px" onclick="adminRunAch()">🏆 تشغيل كشف الإنجازات</button>
    <button class="adm-btn full" style="margin-bottom:8px" onclick="adminExportCSV()">📤 تصدير البيانات (CSV)</button>`;
  // مين ما توقّع المباريات القادمة القريبة
  const soon=GM.filter(m=>counts(m)&&!matchStarted(m)).slice(0,1)[0];
  if(soon){
    const missing=boardData.filter(p=>{const pr=p.g[soon.id];return !pr||pr.h==null||pr.h==='';});
    h+=`<div class="adm-sec">👁️ ما توقّعوا القادمة (${nm(soon.A)} × ${nm(soon.B)})</div>`;
    h+= missing.length?`<div class="adm-miss">${missing.map(p=>esc(p.name)).join(' · ')}</div>`
      :`<div class="nf-empty">✅ الكل توقّع.</div>`;
  }
  // نظرة الجواكر
  h+=`<div class="adm-sec">🃏 الجواكر</div>`;
  const jrows=[];
  GM.forEach(m=>{if(!counts(m))return;
    const who=boardData.filter(p=>p.g[m.id]&&p.g[m.id].j);
    if(who.length)jrows.push(`<div class="adm-jrow"><span>${nm(m.A)} × ${nm(m.B)}</span><span class="adm-jwho">${who.map(p=>esc(p.name)).join('، ')}</span></div>`);});
  const _KOj=computeKOReal();
  for(let m=73;m<=104;m++){const t=_KOj.teamsOf[m];if(!t||!t.a||!t.b)continue;
    const who=boardData.filter(p=>p.ko&&p.ko[m]&&p.ko[m].j);
    if(who.length)jrows.push(`<div class="adm-jrow"><span>🏆 ${nm(t.a)} × ${nm(t.b)}</span><span class="adm-jwho">${who.map(p=>esc(p.name)).join('، ')}</span></div>`);}
  h+= jrows.length?jrows.join(''):`<div class="nf-empty">ما فيه جواكر بعد.</div>`;
  // سجلّ النشاط
  h+=`<div class="adm-sec">📈 آخر النشاط</div>`;
  if(admActivity.length){
    h+=admActivity.map(a=>{let t='';try{t=new Date(a.at).toLocaleString('ar-SA',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){}
      return `<div class="adm-jrow"><span>${esc(a.name)}</span><span class="adm-jwho">${t}</span></div>`;}).join('');
  }else h+=`<div class="nf-empty">—</div>`;
  return h;
}

/* --- كشف الغش --- */
function adminCheatHtml(){
  if(!boardData.length)return `<div class="nf-empty">افتح «الترتيب العام» مرة ثم ارجع.</div>`;
  // لكل مباراة منتهية: نسبة من طابق النتيجة بالضبط. المطابقات النادرة = مشبوهة.
  const flags={};
  GM.forEach(m=>{if(!counts(m))return;const rec=liveFor(m.A,m.B);if(!(rec&&rec.status==='post'))return;
    const aS=scoreFor(rec,m.A),bS=scoreFor(rec,m.B);if(aS==null||bS==null)return;
    let exactPlayers=[],tot=0;
    boardData.forEach(p=>{const pr=p.g[m.id];if(!pr||pr.h==null||pr.h==='')return;tot++;
      if(+pr.h===aS&&+pr.a===bS)exactPlayers.push(p);});
    if(!tot)return;
    // نادرة: طابقها <=2 لاعبين، أو أقل من 20%
    if(exactPlayers.length>0&&(exactPlayers.length<=2||exactPlayers.length/tot<0.2)){
      exactPlayers.forEach(p=>{if(!flags[p.uid])flags[p.uid]={name:p.name,items:[]};
        flags[p.uid].items.push(`${nm(m.A)} ${aS}-${bS} ${nm(m.B)} (طابقها ${exactPlayers.length} فقط)`);});
    }
  });
  const arr=Object.values(flags).sort((a,b)=>b.items.length-a.items.length);
  if(!arr.length)return `<div class="nf-empty">✅ ما فيه مطابقات نادرة مشبوهة.</div>`;
  let h=`<div class="adm-note">⚠️ لاعبون طابقوا نتائج <b>نادرة</b> (قلّة طابقوها). كثرة المطابقات النادرة = مؤشّر (مو دليل قاطع). راجع نمطهم.</div>`;
  h+=arr.map(f=>`<div class="adm-cheat ${f.items.length>=3?'hot':''}">
    <div class="adm-cname">${esc(f.name)} <span class="adm-ccount">${f.items.length} نادرة</span></div>
    ${f.items.map(i=>`<div class="adm-citem">🎯 ${i}</div>`).join('')}</div>`).join('');
  return h;
}

/* ===== الدخول والتنقّل ===== */
let signupMode=false;
function authMsg(msg,type){const m=document.getElementById('authMsg');m.textContent=msg;m.className='auth-msg '+(type||'');}
function toggleMode(){signupMode=!signupMode;
  document.getElementById('loginBtn').textContent=signupMode?'إنشاء حساب':'دخول';
  document.getElementById('nameField').style.display=signupMode?'block':'none';
  document.getElementById('switchBtn').innerHTML=signupMode?'عندك حساب؟ <b>سجّل دخولك</b>':'ما عندك حساب؟ <b>سجّل الآن</b>';authMsg('');}
async function doLogin(){
  const email=document.getElementById('email').value.trim(),pass=document.getElementById('password').value;
  if(!email||!pass){authMsg('اكتب البريد وكلمة المرور','err');return;}
  if(signupMode&&!document.getElementById('dispName').value.trim()){authMsg('اكتب اسمك','err');return;}
  authMsg(signupMode?'جاري إنشاء الحساب...':'جاري الدخول...');
  try{let res;
    if(signupMode){res=await sb.auth.signUp({email,password:pass});if(res.error)throw res.error;
      if(!res.data.session){res=await sb.auth.signInWithPassword({email,password:pass});if(res.error)throw res.error;}
      pendingName=document.getElementById('dispName').value.trim();}
    else{res=await sb.auth.signInWithPassword({email,password:pass});if(res.error)throw res.error;}
    user=res.data.user;await enterApp();
  }catch(e){authMsg(translateErr(e.message),'err');}}
let pendingName='';
function translateErr(m){
  if(/Invalid login/i.test(m))return'البريد أو كلمة المرور غير صحيحة';
  if(/already registered/i.test(m))return'هذا البريد مسجّل، سجّل دخولك';
  if(/at least 6/i.test(m))return'كلمة المرور 6 أحرف على الأقل';
  if(/valid email/i.test(m))return'البريد غير صحيح';return m;}
async function doLogout(){
  if(!confirm('تسجيل الخروج؟'))return;
  await sb.auth.signOut();clearInterval(cdTimer);clearInterval(lockTimer);clearTimeout(idleTimer);stopLiveRefresh();
  document.getElementById('app').style.display='none';document.getElementById('auth').style.display='flex';}
async function enterApp(){
  document.getElementById('auth').style.display='none';
  try{applyTheme(localStorage.getItem('theme')||'dark');}catch(e){}
  // حدّد آخر تاب وفعّله قبل العرض (بدون وميض المباريات)
  let lt='matches';try{lt=localStorage.getItem('lastTab')||'matches';}catch(e){}
  if(!document.getElementById('page-'+lt))lt='matches';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+lt).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tb=tabBtn(lt);if(tb)tb.classList.add('active');
  document.getElementById('app').style.display='block';
  window.scrollTo(0,0);
  spin(1);
  await loadState();
  await loadBoard(); // يحمّل live + boardData معاً (عشان عدّاد الجواكر صحيح من البداية)
  spin(0);
  renderNext();renderMatches();startLiveRefresh();startLockTimer();
  setupAdmin();renderReminder();
  loadChallenges();
  // حالة التجميد (لو الأدمن جمّد اللاعب)
  try{const {data}=await sb.from('admin_flags').select('frozen').eq('user_id',user.id).maybeSingle();myFrozen=!!(data&&data.frozen);}catch(e){myFrozen=false;}
  if(lt!=='matches')showTab(lt); // يرسم محتوى التاب الصحيح
  await loadAnnouncements();
  const celebrated=checkCelebration();
  if(!celebrated)maybeShowAnnouncement();
}

/* حفظ التاب */

/* ===== التحدّيات ===== */
let challenges=[];
let chalResults=[];
async function loadResults(){try{const {data}=await sb.rpc('get_results');chalResults=data||[];}catch(e){chalResults=[];}}
function chalMatch(mk){return GM.find(x=>x.id===mk);}
function chalMatchLabel(c){return `${fl(c.team_a)} ${nm(c.team_a)} × ${nm(c.team_b)} ${fl(c.team_b)}`;}
function chalDayLabel(c){
  if(c.match_key&&c.match_key.indexOf('ko_')===0){const m=+c.match_key.slice(3);return `${roundOf(m)} · ${koDateLabel(m)}`;}
  const m=chalMatch(c.match_key);if(!m||!m.tm)return '';return `${wdName(m.tm.m,m.tm.d)} ${m.tm.d} ${monName(m.tm.m)} · ${m.tm.t}`;}
function predStr(g,mk,ko){
  if(mk&&mk.indexOf('ko_')===0){const m=+mk.slice(3);const r=(ko||{})[m];if(!r||r.hs==null||r.hs==='')return null;return `${r.hs} - ${r.as}`;}
  const r=(g||{})[mk];if(!r||r.h==null||r.h==='')return null;return `${r.h} - ${r.a}`;}

async function loadChallenges(){
  try{const {data}=await sb.rpc('get_challenges');challenges=data||[];}catch(e){challenges=[];}
  await loadResults();
  updateChalDot();
}
let prevRecv=-1;
function updateChalDot(){
  const dot=document.getElementById('chalDot');if(!dot)return;
  const recv=challenges.filter(c=>c.status==='pending'&&c.challenger_uid!==user.id&&(c.invited_uids||[]).includes(user.id)).length;
  dot.style.display=recv>0?'inline-block':'none';
  if(prevRecv>=0 && recv>prevRecv){pill('⚔️ وصلك تحدّي جديد!');}
  prevRecv=recv;
}

function chalTeams(c){return `${fl(c.team_a)} ${nm(c.team_a)} <span class="cm-x">×</span> ${nm(c.team_b)} ${fl(c.team_b)}`;}
function chalEmpty(t){return `<div class="chal-empty">${t}</div>`;}

function renderChallenges(){
  const host=document.getElementById('chalHost');if(!host)return;
  const me=user.id;
  if(myFrozen){host.innerHTML=`<div class="frozen-banner">🔒 حسابك مجمّد. لا يمكنك إنشاء تحدّيات.</div>`;return;}
  const received=challenges.filter(c=>c.status==='pending'&&c.challenger_uid!==me&&(c.invited_uids||[]).includes(me));
  const sent=challenges.filter(c=>c.status==='pending'&&c.challenger_uid===me);
  const active=challenges.filter(c=>c.status==='active'&&(c.challenger_uid===me||c.opponent_uid===me));
  const done=challenges.filter(c=>c.status==='done'&&(c.challenger_uid===me||c.opponent_uid===me));

  let h=`<div class="chal-intro">⚔️ تحدَّ لاعباً في توقّع مباراة. الأعلى نقاطاً يفوز، والخاسر يخسر نقاط تلك المباراة! <b>تحدّي نشط واحد لكل يوم</b>.</div>
    <button class="chal-new-btn" onclick="openNewChallenge()">⚔️ تحدّي جديد</button>`;

  // وصلتك
  h+=`<div class="chal-sec">🔔 دعوات وصلتك ${received.length?`<span class="chal-cnt">${received.length}</span>`:''}</div>`;
  if(!received.length)h+=chalEmpty('ما وصلك أي تحدّي.');
  received.forEach(c=>{h+=`<div class="chal-card recv">
    <div class="cc-head"><span class="cc-badge recv">🔔 دعوة تحدّي</span><span class="cc-day">${chalDayLabel(c)}</span></div>
    <div class="cc-vs"><span class="cc-p them">${esc(c.challenger_name)}</span><span class="cc-x2">⚔️</span><span class="cc-p you">أنت</span></div>
    <div class="cc-match">${chalTeams(c)}</div>
    <div class="cc-actions"><button class="chal-accept" onclick="acceptChallenge(${c.id})">قبول ✅</button><button class="chal-decline" onclick="declineChallenge(${c.id})">رفض ✖</button></div>
  </div>`;});

  // نشط
  h+=`<div class="chal-sec">⏳ نشط</div>`;
  if(!active.length)h+=chalEmpty('ما عندك تحدّي نشط.');
  active.forEach(c=>{
    const iAmC=c.challenger_uid===me;
    const opp=iAmC?c.opponent_name:c.challenger_name;
    const oppUid=iAmC?c.opponent_uid:c.challenger_uid;
    const myP=predStr(state.g,c.match_key,state.ko);
    const oppRow=(boardData.find(x=>x.uid===oppUid)||{});
    const oppP=predStr(oppRow.g,c.match_key,oppRow.ko);
    h+=`<div class="chal-card active">
      <div class="cc-head"><span class="cc-badge act">⏳ نشط</span><span class="cc-day">${chalDayLabel(c)}</span></div>
      <div class="cc-vs"><span class="cc-p you">أنت</span><span class="cc-x2">⚔️</span><span class="cc-p them">${esc(opp||'—')}</span></div>
      <div class="cc-match">${chalTeams(c)}</div>
      ${c.started
        ? `<div class="chal-preds"><span>توقّعك <b>${myP||'—'}</b></span><span>توقّعه <b>${oppP||'🔒'}</b></span></div>`
        : `<div class="chal-lock">🔒 مقفل · ينتظر انتهاء المباراة</div>`}
    </div>`;});

  // مُرسَلة
  h+=`<div class="chal-sec">📤 دعوات مُرسَلة</div>`;
  if(!sent.length)h+=chalEmpty('ما أرسلت دعوات.');
  sent.forEach(c=>{h+=`<div class="chal-card sent">
    <div class="cc-head"><span class="cc-badge sent">📤 بانتظار القبول</span><span class="cc-day">${chalDayLabel(c)}</span></div>
    <div class="cc-match">${chalTeams(c)}</div>
    <div class="chal-invited">دعوت: ${(c.invited_names||[]).map(esc).join('، ')}</div>
    <button class="chal-cancel" onclick="cancelChallenge(${c.id})">إلغاء الدعوة</button>
  </div>`;});

  // منتهية
  if(done.length){
    h+=`<div class="chal-sec">🏁 منتهية</div>`;
    done.forEach(c=>{
      const iAmC=c.challenger_uid===me;
      const opp=iAmC?c.opponent_name:c.challenger_name;
      const myAct=iAmC?c.c_actual:c.o_actual, oppAct=iAmC?c.o_actual:c.c_actual;
      let verdict,cls;
      if(!c.winner_uid){verdict='🤝 تعادل · لا تغيير';cls='tie';}
      else if(c.winner_uid===me){verdict='✅ فزت · حافظت على نقاطك';cls='win';}
      else{verdict=`❌ خسرت · −${c.transferred} نقطة`;cls='lose';}
      h+=`<div class="chal-card done ${cls}">
        <div class="cc-head"><span class="cc-badge ${cls}">🏁 منتهي</span><span class="cc-day">${chalDayLabel(c)}</span></div>
        <div class="cc-vs"><span class="cc-p you">أنت</span><span class="cc-x2">⚔️</span><span class="cc-p them">${esc(opp||'—')}</span></div>
        <div class="cc-match">${chalTeams(c)}</div>
        <div class="chal-verdict ${cls}">${verdict}</div>
        <div class="chal-preds"><span>نقاطك <b>${myAct==null?'—':myAct}</b></span><span>نقاطه <b>${oppAct==null?'—':oppAct}</b></span></div>
      </div>`;});
  }
  // نتائج التحدّيات (عامة للجميع)
  h+=`<div class="chal-sec">🏁 نتائج التحدّيات (للجميع)</div>`;
  if(!chalResults.length)h+=chalEmpty('ما فيه نتائج بعد.');
  chalResults.forEach(c=>{
    let line,cls;
    if(c.tie){line=`🤝 ${esc(c.challenger_name)} و ${esc(c.opponent_name)} · تعادل`;cls='tie';}
    else{
      const wName=c.winner_uid===c.challenger_uid?c.challenger_name:c.opponent_name;
      const lName=c.winner_uid===c.challenger_uid?c.opponent_name:c.challenger_name;
      line=`🏆 ${esc(wName)} فاز على ${esc(lName)} · الخاسر −${c.transferred}`;cls='res';
    }
    h+=`<div class="chal-res-row ${cls}">
      <div class="crr-line">${line}</div>
      <div class="crr-match">${chalTeams(c)}</div>
    </div>`;
  });
  host.innerHTML=h;
}

async function declineChallenge(id){
  if(!confirm('رفض هذا التحدّي؟ سيُلغى للجميع.'))return;
  try{
    const {error}=await sb.rpc('challenge_decline',{p_id:id});
    if(error)throw error;
    pill('تم رفض التحدّي');
    await loadChallenges();renderChallenges();
  }catch(e){alert('تعذّر الرفض: '+(e.message||''));}
}

let chalMode='groups';
function openNewChallenge(){
  const others=boardData.filter(p=>p.uid!==user.id);
  if(!others.length){pill('ما فيه لاعبين');return;}
  const ov=document.getElementById('chalOverlay');
  const pRows=others.map(p=>`<label class="chal-pick">
    <span class="cp-name">${esc(p.name)}</span>
    <input type="checkbox" value="${p.uid}" onchange="limitPicks(this)">
  </label>`).join('');

    <div class="ann-top">⚔️ تحدّي جديد</div>
    <div class="ann-field">
      <div class="toggle-wrap" style="margin-bottom:12px">
        <button class="toggle-btn on" id="chalTgGroups" onclick="setChalMode('groups')">⚽ المجموعات</button>
        <button class="toggle-btn" id="chalTgKo" onclick="setChalMode('ko')">🏆 الإقصائيات</button>
      </div>
      <div class="chal-lbl">١) اختر المباراة <small>(أكثر من ٣٠ دقيقة قبل البداية)</small></div>
      <div class="chal-mlist" id="chalMList"></div>
      <div class="chal-lbl" style="margin-top:14px">٢) اختر حتى ٥ لاعبين <small>(أول من يقبل يبدأ التحدّي)</small></div>
      <div class="chal-picks">${pRows}</div>
    </div>
    <div class="ann-foot">
      <button class="ann-cancel" onclick="document.getElementById('chalOverlay').classList.remove('show')">إلغاء</button>
      <button class="ann-close" onclick="sendChallenge()">إرسال ⚔️</button>
    </div>

function setChalMode(m){chalMode=m;
  const g=document.getElementById('chalTgGroups'),k=document.getElementById('chalTgKo');
  if(g)g.classList.toggle('on',m==='groups');if(k)k.classList.toggle('on',m==='ko');
  renderChalMatchList();
}
function renderChalMatchList(){
  const host=document.getElementById('chalMList');if(!host)return;
  const now=Date.now();
  if(chalMode==='ko'){
    const KO=computeKOReal();
    if(!KO.allDone){host.innerHTML=`<div class="chal-empty">🔒 تحدّيات الإقصائيات تنفتح مع <b>بدء الأدوار الإقصائية</b> — بعد اكتمال دور المجموعات وتحدّد كل المتأهلين.</div>`;return;}
    const ups=[];for(let m=73;m<=104;m++){const t=KO.teamsOf[m];const ms=koKickoffMs(m);
      if(t&&t.a&&t.b&&ms&&ms>now+30*60000)ups.push(m);}
    if(!ups.length){host.innerHTML=`<div class="chal-empty">ما فيه مباريات إقصائية متاحة للتحدّي حالياً (لازم تتحدّد أطرافها وتكون أكثر من ٣٠ دقيقة قبل البداية).</div>`;return;}
    host.innerHTML=ups.map((m,i)=>{const t=KO.teamsOf[m];
      return `<label class="chal-mrow">
        <span class="cm-main"><span class="cm-teams">${fl(t.a)} ${nm(t.a)} <span class="cm-x">×</span> ${nm(t.b)} ${fl(t.b)}</span><span class="cm-time">${roundOf(m)} · ${koDateLabel(m)}</span></span>
        <input type="radio" name="chalMatch" value="ko_${m}" data-a="${t.a}" data-b="${t.b}" ${i===0?'checked':''}>
      </label>`;}).join('');
  }else{
    const ups=GM.filter(m=>{const d=matchDate(m.tm);return d&&d.getTime()>now+30*60000;});
    if(!ups.length){host.innerHTML=`<div class="chal-empty">ما فيه مباريات متاحة للتحدّي.</div>`;return;}
    host.innerHTML=ups.map((m,i)=>`<label class="chal-mrow">
      <span class="cm-main"><span class="cm-teams">${fl(m.A)} ${nm(m.A)} <span class="cm-x">×</span> ${nm(m.B)} ${fl(m.B)}</span><span class="cm-time">${wdName(m.tm.m,m.tm.d)} ${m.tm.d}/${m.tm.m} · ${m.tm.t}</span></span>
      <input type="radio" name="chalMatch" value="${m.id}" ${i===0?'checked':''}>
    </label>`).join('');
  }
}
function limitPicks(box){
  const checked=[...document.querySelectorAll('#chalOverlay input[type=checkbox]:checked')];
  if(checked.length>5){box.checked=false;pill('الحد ٥ لاعبين');}
}
async function sendChallenge(){
  const mkEl=document.querySelector('#chalOverlay input[name=chalMatch]:checked');
  const mk=mkEl?mkEl.value:'';
  const uids=[...document.querySelectorAll('#chalOverlay input[type=checkbox]:checked')].map(x=>x.value);
  if(!mk){pill('اختر مباراة');return;}
  if(!uids.length){pill('اختر لاعباً واحداً على الأقل');return;}
  if(uids.length>5){pill('الحد ٥ لاعبين');return;}
  const payload={p_match_key:mk,p_invited:uids};
  if(mk.indexOf('ko_')===0){payload.p_team_a=mkEl.dataset.a;payload.p_team_b=mkEl.dataset.b;}
  try{
    const {error}=await sb.rpc('challenge_create',payload);
    if(error)throw error;
    document.getElementById('chalOverlay').classList.remove('show');
    pill('تم إرسال التحدّي ⚔️');
    await loadChallenges();renderChallenges();
  }catch(e){alert('تعذّر الإرسال: '+(e.message||e.hint||''));}
}
async function acceptChallenge(id){
  if(!confirm('قبول هذا التحدّي؟ لا يمكن التراجع بعد القبول.'))return;
  try{
    const {error}=await sb.rpc('challenge_accept',{p_id:id});
    if(error)throw error;
    pill('قبلت التحدّي ⚔️ بالتوفيق!');
    await loadChallenges();renderChallenges();
  }catch(e){alert('تعذّر القبول: '+(e.message||e.hint||''));}
}
async function cancelChallenge(id){
  if(!confirm('إلغاء هذه الدعوة؟'))return;
  try{
    const {error}=await sb.rpc('challenge_cancel',{p_id:id});
    if(error)throw error;
    pill('تم الإلغاء');
    await loadChallenges();renderChallenges();
  }catch(e){alert('تعذّر الإلغاء: '+(e.message||''));}
}


function tabBtn(name){return [...document.querySelectorAll('.tab')].find(t=>(t.getAttribute('onclick')||'').includes("'"+name+"'"));}

/* تذكير المباريات القريبة غير المتوقّعة */
let remindHidden=false;
function upcomingUnpredicted(hoursWindow){
  const now=Date.now(),lim=now+hoursWindow*3600*1000,out=[];
  GM.forEach(m=>{if(!counts(m))return;const d=matchDate(m.tm);if(!d)return;
    const t=d.getTime();if(t>now&&t<=lim&&!filled(state.g[m.id]))out.push(m);});
  const KO=computeKOReal();
  if(KO.allDone)for(let m=73;m<=104;m++){const tt=KO.teamsOf[m];if(!tt||!tt.a||!tt.b)continue;
    const ms=koKickoffMs(m);if(!ms)continue;const r=state.ko[m];
    if(ms>now&&ms<=lim&&!(r&&r.hs!==''&&r.hs!=null&&r.as!==''&&r.as!=null))out.push({ko:m});}
  return out;
}
function renderReminder(){
  const el=document.getElementById('remind');if(!el)return;
  if(remindHidden){el.style.display='none';return;}
  const soon=upcomingUnpredicted(12);
  if(!soon.length){el.style.display='none';return;}
  const n=soon.length;
  el.style.display='flex';
  el.innerHTML=`<span class="rb-txt">⏰ عندك <b>${n}</b> ${n===1?'مباراة قريبة':'مباريات قريبة'} ما توقّعتها — توقّعها قبل القفل!</span>
    <button onclick="showTab('predict')">توقّع الآن</button>
    <button class="rb-x" onclick="remindHidden=true;document.getElementById('remind').style.display='none'" title="إخفاء">×</button>`;
}

function showTab(name,btn){
  if(!btn)btn=tabBtn(name);
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');window.scrollTo({top:0,behavior:'smooth'});
  saveTab(name);
  if(name==='standings'){if(standMode==='real'||standMode==='thirds'){spin(1);loadLive().then(()=>{spin(0);renderStandings();});}else renderStandings();}
  if(name==='matches'){spin(1);loadLive().then(()=>{spin(0);renderMatches();});loadBoard().then(()=>{if(document.getElementById('page-matches').classList.contains('active'))renderMatches();});}
  startLiveRefresh();
  if(name==='predict'){spin(1);loadLive().then(()=>{spin(0);renderPredict();});}
  if(name==='stats'){spin(1);loadLive().then(()=>{if(statSub==='predictions')loadBoard().then(()=>{spin(0);renderStats();});else{spin(0);renderStats();}});}
  if(name==='points'){spin(1);loadLive().then(()=>{spin(0);renderPoints();});}
  if(name==='knockout'){spin(1);loadLive().then(()=>{spin(0);renderKnockout();});}
  if(name==='board'){spin(1);loadBoard().then(()=>{spin(0);renderBoard();});}
  if(name==='challenges'){spin(1);Promise.all([loadBoard(),loadChallenges()]).then(()=>{spin(0);renderChallenges();});}
  if(name==='myteam'){fillTeamSelect();renderMyteam();}}

let liveTimer=null;
function startLiveRefresh(){stopLiveRefresh();liveTimer=setInterval(async()=>{
  const active=document.querySelector('.page.active');if(!active)return;
  const id=active.id;
  try{
    await loadLive();
    if(id==='page-matches'){await loadBoard();renderMatches();}
    else if(id==='page-points')renderPoints();
    else if(id==='page-standings'){if(typeof standMode!=='undefined'&&(standMode==='real'||standMode==='thirds'))renderStandings();}
    else if(id==='page-board'){await loadBoard();renderBoard();}
    else if(id==='page-knockout'){renderKnockout();}
    else if(id==='page-stats'){if(statSub==='predictions')await loadBoard();renderStats();}
    await loadChallenges();
    if(id==='page-challenges'){await loadBoard();renderChallenges();}
    renderNext();renderReminder();
  }catch(e){}
},60000);}
function stopLiveRefresh(){if(liveTimer){clearInterval(liveTimer);liveTimer=null;}}

document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
document.getElementById('email').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
