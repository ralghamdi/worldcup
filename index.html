<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>™FIFA WORLD CUP 2026</title>
<link rel="icon" type="image/png" href="https://i.ibb.co/LzDpgfLy/2026-FIFA-World-Cup-emblem-svg.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#070A18;--bg-2:#0E1430;--bg-3:#18203F;--line:#283156;  --gold:#E5B838;--gold-bright:#FFD968;--gold-deep:#A6801E;
  --can:#E61D25;--mex:#3CAC3B;--usa:#2A398D;
  --can-soft:rgba(230,29,37,.14);--mex-soft:rgba(60,172,59,.14);--usa-soft:rgba(42,57,141,.18);
  --text:#F7F5EE;--muted:#9AA2C0;--muted-2:#5E668C;
  --ok:#34C76F;--warn:#E8B53A;--bad:#E61D25;
  --radius:18px;--radius-sm:12px;
}
/* الوضع الفاتح */
body.light{
  --bg:#EEF1FA;--bg-2:#FFFFFF;--bg-3:#F3F5FC;--line:#D7DDEE;
  --text:#141A2E;--muted:#5A627F;--muted-2:#8A92AE;
}
body.light{background:var(--bg);
  background-image:radial-gradient(1100px 560px at 82% -12%,rgba(229,184,56,.10),transparent 60%),
    radial-gradient(820px 520px at -8% 8%,rgba(42,57,141,.08),transparent 55%);}
/* مؤشّر التحميل */
.spin-overlay{position:fixed;inset:0;z-index:300;background:rgba(7,10,24,.4);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center}
.spin-overlay.show{display:flex}
.spinner{width:42px;height:42px;border:4px solid rgba(229,184,56,.25);border-top-color:var(--gold-bright);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.theme-btn{background:var(--bg-3);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px}
/* الجرس */
.bell-btn{position:relative;background:var(--bg-3);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px}
.bell-dot{position:absolute;top:-2px;left:-2px;width:11px;height:11px;border-radius:50%;background:#E5484D;border:2px solid var(--bg)}
.bell-overlay{position:fixed;inset:0;z-index:320;background:rgba(7,10,24,.6);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:70px 16px 16px}
.bell-overlay.show{display:flex}
.bell-panel{width:100%;max-width:440px;max-height:80vh;background:var(--bg-2);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.bell-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);font-family:'Cairo';font-weight:900;font-size:17px;color:var(--gold-bright)}
.bell-x{background:var(--bg-3);border:1px solid var(--line);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px}
.bell-list{overflow-y:auto;padding:10px}
.nf-empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.nf-item{display:flex;gap:13px;padding:14px;border-radius:13px;background:var(--bg-3);margin-bottom:9px;border:1px solid transparent}
.nf-item.ach{border-color:var(--gold-deep);background:linear-gradient(135deg,rgba(229,184,56,.10),var(--bg-3))}
.nf-ic{font-size:22px;flex:none}
.nf-b{flex:1;min-width:0}
.nf-title{font-family:'Cairo';font-weight:800;font-size:14px;color:var(--text);margin-bottom:4px}
.nf-text{font-size:13px;line-height:1.6;color:var(--muted);white-space:pre-wrap;word-wrap:break-word}
.nf-date{font-size:11px;color:var(--muted-2);margin-top:6px}
/* لوحة الأدمن */
.admin-fab{position:fixed;bottom:84px;left:18px;z-index:90;width:52px;height:52px;border-radius:50%;background:linear-gradient(180deg,#3a4170,#222a52);border:1px solid var(--gold-deep);color:#fff;font-size:22px;cursor:pointer;display:none;box-shadow:0 6px 20px rgba(0,0,0,.4)}
.admin-fab.show{display:block}
.admin-overlay{position:fixed;inset:0;z-index:330;background:rgba(7,10,24,.6);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:50px 14px 14px}
.admin-overlay.show{display:flex}
.adm-panel{width:100%;max-width:480px;max-height:88vh;background:var(--bg-2);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.adm-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--line);font-family:'Cairo';font-weight:900;font-size:17px;color:var(--gold-bright)}
.adm-tabs{display:flex;gap:6px;padding:10px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.adm-sugg{background:var(--bg-3);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px}
.adm-sugg-head{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
.adm-sugg-head b{color:var(--gold-bright)}
.adm-sugg-text{font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;margin-bottom:8px}
.adm-chal-res{margin-top:6px;color:var(--gold-bright);font-size:12px}
.adm-tab{flex:1;padding:9px;border-radius:10px;background:var(--bg-3);border:1px solid var(--line);color:var(--muted);font-family:'Cairo';font-weight:700;font-size:12px;cursor:pointer}
.adm-tab.on{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1405;border-color:var(--gold)}
.adm-body{overflow-y:auto;padding:14px}
.adm-field{margin-bottom:14px}
.adm-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.adm-field select,.adm-field input{width:100%;padding:11px;border-radius:10px;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-family:'Tajawal';font-size:14px}
.adm-inline{display:flex;gap:8px}.adm-inline input{flex:1}
.adm-btn{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1405;border:none;border-radius:10px;padding:11px 18px;font-family:'Cairo';font-weight:800;font-size:13px;cursor:pointer;flex:none}
.adm-btn.full{width:100%}
.adm-sec{font-family:'Cairo';font-weight:800;font-size:14px;color:var(--gold-bright);margin:16px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.adm-pred{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--bg-3);border-radius:9px;margin-bottom:7px;font-size:12px}
.adm-pmatch{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted)}
.adm-pval{font-family:'Anton';font-size:14px;color:var(--text);flex:none}
.adm-jok{margin-inline-start:3px}
.adm-res{color:var(--gold-bright);margin-inline-start:4px;font-size:12px}
.adm-bd{background:var(--bg-3);border:1px solid var(--line);border-radius:11px;padding:6px 12px;margin-bottom:6px}
.adm-bd-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-family:'Cairo';font-weight:700;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05)}
.adm-bd-row:last-child{border-bottom:none}
.adm-bd-row.gold span:last-child{color:var(--gold-bright)}
.adm-bd-row.total{font-weight:900;font-size:15px}.adm-bd-row.total span:last-child{color:var(--gold-bright);font-family:'Anton'}
.adm-bd-note{font-size:11px;color:var(--muted);margin:2px 0 12px}
.adm-pts{font-family:'Anton';font-size:13px;flex:none;padding:1px 7px;border-radius:99px}
.adm-pts.p5{background:rgba(34,197,94,.18);color:#4ade80}
.adm-pts.p3{background:rgba(229,184,56,.18);color:var(--gold-bright)}
.adm-pts.p2{background:rgba(96,165,250,.16);color:#93c5fd}
.adm-pts.p0{background:rgba(148,163,184,.14);color:var(--muted-2)}
.adm-pacts{display:flex;gap:5px;flex:none}
.adm-mini{background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:5px 8px;cursor:pointer;font-size:12px;color:var(--text)}
.adm-mini.del{border-color:rgba(229,72,77,.4);color:#E5777A}
.adm-note,.adm-cheat{margin-bottom:10px}
.adm-note{background:var(--bg-3);border:1px solid var(--gold-deep);border-radius:10px;padding:11px;font-size:12px;line-height:1.6;color:var(--muted)}
.adm-cheat{background:var(--bg-3);border:1px solid var(--line);border-radius:11px;padding:12px}
.adm-cheat.hot{border-color:#E5484D}
.adm-cname{font-family:'Cairo';font-weight:800;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.adm-ccount{font-size:11px;background:rgba(229,72,77,.16);color:#E5777A;padding:2px 8px;border-radius:99px}
.adm-citem{font-size:12px;color:var(--muted);padding:3px 0}
.adm-ann{display:flex;align-items:center;gap:10px;padding:11px;background:var(--bg-3);border-radius:10px;margin-bottom:7px}
.adm-ab{flex:1;min-width:0}.adm-ab b{font-size:13px}
.adm-adate{font-size:11px;color:var(--muted-2);margin-top:3px}
.adm-stats{display:flex;gap:8px;margin-bottom:12px}
.ast{flex:1;background:var(--bg-3);border:1px solid var(--line);border-radius:11px;padding:12px 6px;text-align:center}
.ast-n{font-family:'Anton';font-size:24px;color:var(--gold-bright)}
.ast-l{font-size:10px;color:var(--muted);margin-top:2px}
.adm-miss{background:var(--bg-3);border:1px solid rgba(229,72,77,.3);border-radius:10px;padding:11px;font-size:12px;line-height:1.9;color:var(--text)}
.adm-jrow{display:flex;justify-content:space-between;gap:10px;padding:8px 11px;background:var(--bg-3);border-radius:8px;margin-bottom:6px;font-size:12px}
.adm-jrow>span:first-child{color:var(--muted);flex:none}
.adm-jwho{color:var(--gold-bright);text-align:left;font-size:11px}
.adm-toggles{display:flex;gap:8px;margin-bottom:6px}
.adm-tgl{flex:1;padding:10px;border-radius:10px;background:var(--bg-3);border:1px solid var(--line);color:var(--text);font-family:'Cairo';font-weight:700;font-size:12px;cursor:pointer}
.adm-tgl.on{background:rgba(229,184,56,.15);border-color:var(--gold)}
.adm-tgl.danger{border-color:rgba(229,72,77,.4);color:#E5777A}
.frozen-banner{background:linear-gradient(135deg,rgba(229,72,77,.15),var(--bg-3));border:1px solid #E5484D;border-radius:14px;padding:24px;text-align:center;font-size:15px;line-height:1.8;color:var(--text);font-family:'Cairo';font-weight:700}
/* الاحتفال بالإنجاز */
.celebrate-overlay{position:fixed;inset:0;z-index:340;background:rgba(7,10,24,.78);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;overflow:hidden}
.celebrate-overlay.show{display:flex}
.cel-box{position:relative;z-index:2;background:linear-gradient(160deg,var(--bg-2),var(--bg-3));border:2px solid var(--gold);border-radius:22px;padding:34px 30px;text-align:center;max-width:380px;width:100%;box-shadow:0 20px 70px rgba(0,0,0,.5);animation:celpop .5s cubic-bezier(.2,1.3,.5,1)}
@keyframes celpop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.cel-emoji{font-size:64px;margin-bottom:10px;animation:celbounce 1s ease infinite}
@keyframes celbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.cel-title{font-family:'Cairo';font-weight:900;font-size:26px;color:var(--gold-bright);margin-bottom:16px}
.cel-line{font-size:16px;line-height:1.7;color:var(--text);margin-bottom:8px}
.cel-line b{font-family:'Anton';color:var(--gold-bright);font-size:20px;margin:0 2px}
.cel-btn{margin-top:20px;background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1405;border:none;border-radius:99px;padding:13px 30px;font-family:'Cairo';font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 6px 20px rgba(212,169,60,.4)}
.cel-confetti{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.conf{position:absolute;top:-20px;border-radius:2px;animation:conffall linear forwards}
@keyframes conffall{0%{top:-20px;opacity:1}100%{top:105%;opacity:.9}}
/* بانر التذكير */
.remind-bar{margin:12px 16px 0;background:linear-gradient(135deg,rgba(229,184,56,.18),var(--bg-2));border:1px solid var(--gold);border-radius:13px;padding:12px 14px;font-size:13px;display:flex;align-items:center;gap:10px;line-height:1.6}
.remind-bar .rb-txt{flex:1}
.remind-bar button{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1405;border:none;border-radius:99px;padding:7px 13px;font-family:'Cairo';font-weight:800;font-size:12px;cursor:pointer;flex:none}
.remind-bar .rb-x{background:none;border:none;color:var(--muted);font-size:18px;padding:0 4px;cursor:pointer}
/* أسهم الصعود/الهبوط */
.lb-up{font-size:11px;color:#34C76F;font-weight:800}
.lb-down{font-size:11px;color:#E5484D;font-weight:800}
.lb-same{font-size:11px;color:var(--muted-2)}
/* مواجهة مباشرة */
.h2h-box{background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--gold-deep);border-radius:14px;padding:14px;margin-bottom:14px}
.h2h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.h2h-who{flex:1;text-align:center;font-family:'Cairo';font-weight:900;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.h2h-who.me{color:var(--gold-bright)}
.h2h-vs{flex:none;font-size:16px;padding:0 8px}
.h2h-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line)}
.h2h-v{flex:1;text-align:center;font-family:'Anton';font-size:19px;color:var(--muted)}
.h2h-v.win{color:var(--gold-bright)}
.h2h-l{flex:1;text-align:center;font-size:12px;color:var(--muted)}
/* شارات */
.badge-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:6px}
.badge{display:flex;align-items:center;gap:9px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:11px 12px;opacity:.45}
.badge.on{opacity:1;border-color:var(--gold-deep);background:linear-gradient(135deg,rgba(229,184,56,.12),var(--bg-2))}
.badge .bd-ic{font-size:22px;flex:none;filter:grayscale(1)}
.badge.on .bd-ic{filter:none}
.badge .bd-t{font-size:12px;font-weight:700;line-height:1.3}
/* تحليل */
.ana-sum{background:var(--bg-2);border:1px solid var(--gold-deep);border-radius:11px;padding:11px 13px;font-size:13px;line-height:1.7;margin-bottom:9px}
.ana-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.ana-t{flex:none;width:130px;font-size:12px}
.ana-t small{color:var(--muted-2)}
.ana-bar{flex:1;height:9px;background:var(--bg-3);border-radius:99px;overflow:hidden}
.ana-bar span{display:block;height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright));border-radius:99px}
.ana-p{flex:none;width:42px;text-align:left;font-size:14px;color:var(--gold-bright)}
/* رسم */
.spark-box{background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:16px 12px 12px}
.bars{display:flex;align-items:flex-end;justify-content:space-around;gap:5px;height:130px;padding:0 2px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;min-width:0;max-width:46px}
.bar-val{font-family:'Anton';font-size:13px;color:var(--gold-bright)}
.bar{width:100%;background:linear-gradient(180deg,#5BCB86,#34C76F);border-radius:6px 6px 0 0;transition:height .4s;min-height:4px}
.bar-day{font-size:10px;color:var(--muted);white-space:nowrap}
.spark-lbl{text-align:center;font-size:12px;color:var(--muted);margin-top:12px}
/* مشاركة */
.share-wrap{margin-top:14px;text-align:center}
.share-btn{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1405;border:none;border-radius:99px;padding:13px 26px;font-family:'Cairo';font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 6px 20px rgba(212,169,60,.35)}
.mt-majority{margin-top:10px;padding-top:9px;border-top:1px dashed var(--line);font-size:11px;color:var(--muted);text-align:center;line-height:1.6}
.mt-majority b{color:var(--gold-bright)}
.mt-jokhype{margin-top:10px;padding:9px 12px;border-radius:10px;background:linear-gradient(135deg,rgba(229,184,56,.18),var(--bg-3));border:1px solid var(--gold);font-size:12px;color:var(--text);text-align:center;line-height:1.6}
.mt-jokhype b{font-family:'Anton';color:var(--gold-bright);font-size:15px;margin:0 2px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;
  background-image:radial-gradient(1100px 560px at 82% -12%,rgba(229,184,56,.14),transparent 60%),
    radial-gradient(820px 520px at -8% 8%,rgba(42,57,141,.22),transparent 55%),
    radial-gradient(820px 520px at 108% 92%,rgba(230,29,37,.12),transparent 55%),
    radial-gradient(720px 520px at 50% 124%,rgba(60,172,59,.12),transparent 55%);
  background-attachment:fixed;}
.num{font-family:'Anton',sans-serif;letter-spacing:.5px}
.head{font-family:'Cairo',sans-serif}
.tricolor{height:4px;width:100%;background:linear-gradient(90deg,var(--can) 0 33.3%,var(--mex) 33.3% 66.6%,var(--usa) 66.6% 100%)}

/* الدخول */
#auth{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(1000px 700px at 50% -20%,rgba(212,169,60,.16),transparent 60%),var(--bg);}
.auth-card{width:100%;max-width:380px;text-align:center;animation:rise .6s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.brand-mark{position:relative;margin-bottom:6px;display:flex;justify-content:center}
.brand-emblem{height:150px;width:150px;filter:drop-shadow(0 8px 28px rgba(212,169,60,.4))}
.brand-title{font-family:'Cairo';font-weight:900;font-size:26px;margin-top:4px;letter-spacing:1px}
.brand-sub{color:var(--gold-bright);font-weight:700;font-size:13px;letter-spacing:3px;margin-top:2px;text-transform:uppercase}
.auth-tri{width:90px;height:4px;margin:18px auto;border-radius:4px;background:linear-gradient(90deg,var(--can),var(--mex),var(--usa))}
.auth-form{margin-top:24px;display:flex;flex-direction:column;gap:12px;text-align:right}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}
.field input{width:100%;padding:14px 16px;border-radius:var(--radius-sm);background:var(--bg-2);border:1.5px solid var(--line);
  color:var(--text);font-family:'Tajawal';font-size:15px;transition:border-color .2s,box-shadow .2s}
.field input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,169,60,.12)}
.btn-gold{margin-top:6px;padding:15px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-family:'Cairo';font-weight:800;
  font-size:16px;color:#1a1405;background:linear-gradient(180deg,var(--gold-bright),var(--gold));box-shadow:0 8px 20px rgba(212,169,60,.25);transition:transform .15s}
.btn-gold:active{transform:translateY(1px)}
.btn-ghost{background:none;border:none;color:var(--muted);font-family:'Tajawal';font-weight:700;font-size:13px;cursor:pointer;padding:8px;margin-top:4px}
.btn-ghost b{color:var(--gold-bright)}
.auth-msg{min-height:18px;font-size:13px;font-weight:700;margin-top:4px}
.auth-msg.err{color:var(--bad)}.auth-msg.ok{color:var(--ok)}

/* التطبيق */
#app{display:none;min-height:100%;padding-bottom:40px;max-width:760px;margin:0 auto}
.topbar{position:sticky;top:0;z-index:40;background:rgba(8,11,22,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);box-shadow:0 2px 20px rgba(0,0,0,.3)}
.topbar .tricolor{height:3px;opacity:.9}
.topbar-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.topbar-actions{display:flex;align-items:center;gap:5px;margin-inline-start:6px;flex:none}
.mini-mark{display:flex;align-items:center;gap:9px;min-width:0;flex:1}
.mini-emblem{height:38px;width:38px;flex:none;filter:drop-shadow(0 2px 6px rgba(212,169,60,.3))}
.mini-title{font-family:'Cairo';font-weight:900;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#F7F5EE}.mini-title span{color:var(--gold-bright)}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);background:var(--bg-2);color:var(--text);font-size:16px;cursor:pointer;display:grid;place-items:center}
.logout-btn{padding:8px 11px;border-radius:11px;border:1px solid var(--line);background:var(--bg-2);color:var(--text);
  font-family:'Tajawal';font-weight:700;font-size:13px;cursor:pointer;transition:border-color .2s,color .2s}
.logout-btn:active{transform:translateY(1px)}
.logout-btn:hover{border-color:var(--bad);color:var(--bad)}

/* بطاقة المباراة القادمة */
.next-card{margin:14px 16px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:linear-gradient(135deg,var(--bg-2),var(--bg-3));position:relative}
.next-card.ksa{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 8px 30px rgba(212,169,60,.18)}
.next-card .tricolor{position:absolute;top:0;left:0}
.next-inner{padding:16px}
.next-label{font-size:11px;letter-spacing:2px;color:var(--gold-bright);font-weight:800;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.next-teams{display:flex;align-items:center;justify-content:center;gap:14px}
.next-team{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.next-flag{font-size:34px}
.next-name{font-weight:700;font-size:13px;text-align:center}
.next-vs{font-family:'Anton';color:var(--muted);font-size:20px}
.next-meta{text-align:center;margin-top:12px;color:var(--muted);font-size:12px;font-weight:600}
.next-count{font-family:'Cairo';font-weight:900;color:var(--gold-bright);font-size:16px;margin-top:3px;text-align:center}

/* تابات */
.tabs{display:flex;gap:6px;padding:6px;margin:0 12px;background:var(--bg-2);border-radius:14px;border:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 14px;border-radius:10px;border:none;background:none;color:var(--muted);font-family:'Cairo';font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#1a1405;box-shadow:0 4px 12px rgba(212,169,60,.25)}

.page{display:none;padding:16px;animation:fade .35s}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* شريط التقدّم */
.progress-wrap{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:8px}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.progress-label{font-family:'Cairo';font-weight:700;font-size:14px}
.progress-count{font-family:'Anton';font-size:22px;color:var(--gold-bright)}
.progress-count small{font-family:'Tajawal';font-size:13px;color:var(--muted)}
.progress-bar{height:8px;background:var(--bg-3);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright));border-radius:99px;transition:width .4s}
.tz-note{font-size:12px;color:var(--gold);margin:12px 2px 4px;font-weight:600}

/* يوم */
.day-head{display:flex;align-items:center;gap:10px;margin:20px 2px 10px}
.day-date{font-family:'Cairo';font-weight:900;font-size:15px}
.day-line{flex:1;height:1px;background:var(--line)}
.day-num{font-family:'Anton';font-size:13px;color:var(--muted-2);background:var(--bg-2);border:1px solid var(--line);border-radius:8px;padding:2px 8px}

/* مباراة */
.match{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px;position:relative}
.match.ksa{border-color:rgba(212,169,60,.5);background:linear-gradient(135deg,rgba(212,169,60,.07),var(--bg-2))}
.match.ksa::before{content:attr(data-mybadge);position:absolute;top:-9px;right:14px;background:var(--gold);color:#1a1405;font-family:'Cairo';font-weight:800;font-size:10px;padding:2px 9px;border-radius:99px}
.m-row{display:flex;align-items:center;gap:8px}
.m-side{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.m-side.away{flex-direction:row-reverse;text-align:left}
.m-flag{font-size:24px;flex:none}
.m-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-score{display:flex;align-items:center;gap:6px;flex:none}
.m-score input{width:44px;height:44px;text-align:center;font-family:'Anton';font-size:21px;background:var(--bg-3);
  border:1.5px solid var(--line);border-radius:10px;color:var(--text);transition:border-color .2s;
  -moz-appearance:textfield;appearance:textfield;padding:0;line-height:44px}
.m-score input::-webkit-outer-spin-button,.m-score input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.m-score input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,169,60,.12)}
.m-score input.filled{border-color:var(--gold-deep)}
.score-stepper{display:flex;flex-direction:column;align-items:center;gap:4px}
.step-btn{width:40px;height:28px;border:none;border-radius:8px;background:var(--bg-3);color:var(--gold-bright);font-size:19px;font-weight:800;font-family:inherit;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .12s}
.step-btn:active{background:var(--gold-deep);color:#1a1405;transform:scale(.94)}
.step-btn:disabled{opacity:.3;cursor:not-allowed}
.m-score input:disabled{opacity:.45;cursor:not-allowed;background:var(--bg-2)}
/* مربّع التوقّع المقفل في السابقة (يطابق الخانة) */
.m-box{width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;font-family:'Anton';font-size:21px;background:var(--bg-2);border:1.5px solid var(--gold-deep);border-radius:10px;color:var(--gold-bright)}
/* سطر النتيجة الصغير تحت التوقّع */
.res-line{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);flex-wrap:wrap}
.res-line.live{border-color:rgba(229,72,77,.4)}
.res-line .rl-lbl{color:var(--muted-2)}
.res-line .rl-sc{font-family:'Anton';font-size:17px;color:var(--text);letter-spacing:.5px}
.res-line .rl-pts{font-family:'Cairo';font-weight:800;font-size:11px;padding:2px 9px;border-radius:99px}
.rl-pts.p5{background:rgba(52,199,111,.18);color:#5BCB86;border:1px solid rgba(52,199,111,.45)}
.rl-pts.p3{background:rgba(229,184,56,.18);color:var(--gold-bright);border:1px solid rgba(229,184,56,.45)}
.rl-pts.p2{background:rgba(154,162,192,.14);color:var(--muted);border:1px solid var(--line)}
.rl-pts.p0{background:rgba(229,72,77,.12);color:#E5777A;border:1px solid rgba(229,72,77,.3)}
.match.locked{opacity:.78}
.match.locked .m-time{color:var(--bad);font-weight:700}
.m-dash{color:var(--muted-2);font-family:'Anton'}
.m-time{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;font-weight:600}
/* الجوكر */
.joker-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(135deg,rgba(229,184,56,.12),var(--bg-2));border:1px solid var(--gold-deep);border-radius:14px;padding:12px 14px;margin-bottom:12px}
.joker-bar .jb-t{font-family:'Cairo';font-weight:800;font-size:13px;color:var(--gold-bright)}
.joker-bar .jb-t small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:2px}
.joker-bar .jb-n{font-family:'Anton';font-size:24px;color:var(--gold-bright);flex:none}
.m-joker{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.joker-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--gold-deep);background:var(--bg-3);color:var(--gold-bright);
  font-family:'Cairo';font-weight:800;font-size:11px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.joker-btn.on{background:linear-gradient(180deg,var(--gold-bright),var(--gold));color:#1a1405;border-color:var(--gold-bright);box-shadow:0 3px 12px rgba(212,169,60,.4)}
.joker-btn:disabled{opacity:.4;cursor:not-allowed}
.match.jok{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.match.jok::after{content:"🃏 ×2";position:absolute;top:-9px;left:14px;background:var(--gold);color:#1a1405;font-family:'Cairo';font-weight:800;font-size:10px;padding:2px 9px;border-radius:99px}
/* البطل */
.champ-card{background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--gold);border-radius:16px;padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.champ-card .tricolor{position:absolute;top:0;left:0}
.champ-h{font-family:'Cairo';font-weight:900;font-size:15px;color:var(--gold-bright);margin-bottom:4px;display:flex;align-items:center;gap:7px}
.champ-sub{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6}
.lb-chal{font-size:11px;color:#e06c6c;margin-top:3px;font-weight:700}
.chal-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff4d4d;margin-inline-start:3px;vertical-align:middle}
.chal-intro{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.chal-new-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));border:none;color:#1a1405;font-weight:800;font-family:inherit;font-size:15px;cursor:pointer;margin-bottom:16px}
.chal-sec{font-family:'Cairo';font-weight:800;font-size:14px;margin:16px 0 8px;color:var(--gold-bright)}
.chal-cnt{background:#ff4d4d;color:#fff;border-radius:10px;padding:0 7px;font-size:11px;margin-inline-start:4px}
.chal-empty{color:var(--muted);font-size:12.5px;padding:14px;text-align:center;background:var(--bg-2);border:1px dashed var(--line);border-radius:11px}
.chal-card{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px}
.chal-card.recv{border-color:var(--gold-deep)}
.chal-card.done.win{border-color:#7BD88F}
.chal-card.done.lose{border-color:#e06c6c}
.chal-top{font-size:14px;margin-bottom:5px}
.chal-match{font-family:'Cairo';font-weight:800;font-size:14px;margin-bottom:3px}
.chal-day{font-size:11px;color:var(--muted);margin-bottom:8px}
.chal-lock{font-size:12px;color:var(--muted);background:var(--bg-3);border-radius:8px;padding:8px;text-align:center}
.chal-preds{display:flex;gap:10px;justify-content:space-between;background:var(--bg-3);border-radius:8px;padding:9px;font-size:13px}
.chal-invited{font-size:12px;color:var(--muted);margin-bottom:8px}
.chal-verdict{font-weight:800;font-size:14px;margin:6px 0;padding:6px;border-radius:8px;text-align:center}
.chal-verdict.win{color:#7BD88F;background:rgba(123,216,143,.12)}
.chal-verdict.lose{color:#e06c6c;background:rgba(224,108,108,.12)}
.chal-verdict.tie{color:var(--muted);background:var(--bg-3)}
.chal-accept{width:100%;padding:11px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-deep));border:none;color:#1a1405;font-weight:800;font-family:inherit;cursor:pointer}
.cc-actions{display:flex;gap:8px}
.cc-actions .chal-accept{flex:1}
.chal-decline{flex:none;padding:11px 16px;border-radius:10px;background:transparent;border:1.5px solid #e06c6c;color:#e06c6c;font-weight:800;font-family:inherit;cursor:pointer}
.chal-res-row{background:var(--bg-2);border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:7px}
.chal-res-row.res{border-inline-start:3px solid var(--gold-deep)}
.chal-res-row.tie{border-inline-start:3px solid var(--muted-2)}
.crr-line{font-family:'Cairo';font-weight:700;font-size:13px;margin-bottom:3px}
.crr-match{font-size:11px;color:var(--muted)}
.chal-cancel{padding:8px 16px;border-radius:10px;background:transparent;border:1px solid #e06c6c;color:#e06c6c;font-family:inherit;cursor:pointer}
.chal-lbl{font-size:12px;color:var(--muted);margin-bottom:6px}
.chal-sel{width:100%;padding:11px;border-radius:10px;background:var(--bg-3);border:1.5px solid var(--gold-deep);color:var(--text);font-family:inherit;font-size:13px}
.chal-modal .ann-field{max-height:62vh;overflow-y:auto}
.chal-mlist{display:flex;flex-direction:column;gap:6px;max-height:34vh;overflow-y:auto;padding:2px}
.chal-mrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;background:var(--bg-3);border:1.5px solid transparent;border-radius:11px;cursor:pointer}
.chal-mrow:has(input:checked){border-color:var(--gold);background:rgba(212,169,60,.10)}
.cm-main{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;text-align:right}
.cm-teams{font-family:'Cairo';font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm-time{font-size:11px;color:var(--muted)}
.cm-x{color:var(--muted-2);font-weight:400;margin:0 3px}
.chal-mrow input,.chal-pick input{width:20px;height:20px;accent-color:var(--gold);flex:none}.chal-modal .ann-field input[type=radio],.chal-modal .ann-field input[type=checkbox]{width:22px !important;height:22px !important;padding:0 !important;margin:0 !important;flex:none;accent-color:var(--gold)}
.chal-picks{display:flex;flex-direction:column;gap:6px;max-height:34vh;overflow-y:auto;padding:2px}
.chal-pick{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px;background:var(--bg-3);border:1.5px solid transparent;border-radius:11px;font-size:14px;cursor:pointer}
.chal-pick:has(input:checked){border-color:var(--gold);background:rgba(212,169,60,.10)}
.cp-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;font-weight:600}
.cc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cc-badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;background:var(--bg-3);color:var(--muted)}
.cc-badge.recv{background:rgba(212,169,60,.16);color:var(--gold-bright)}
.cc-badge.act{background:rgba(123,180,255,.14);color:#8fbaff}
.cc-badge.win{background:rgba(123,216,143,.16);color:#7BD88F}
.cc-badge.lose{background:rgba(224,108,108,.16);color:#e06c6c}
.cc-badge.tie{background:var(--bg-3);color:var(--muted)}
.cc-day{font-size:11px;color:var(--muted)}
.cc-vs{display:flex;align-items:center;justify-content:center;gap:12px;margin:4px 0 9px}
.cc-p{font-family:'Cairo';font-weight:800;font-size:15px;max-width:40%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-p.you{color:var(--gold-bright)}
.cc-x2{font-size:18px}
.cc-match{text-align:center;font-family:'Cairo';font-weight:700;font-size:13.5px;background:var(--bg-3);border-radius:9px;padding:9px;margin-bottom:9px}
.cc-match .cm-x{color:var(--muted-2);margin:0 4px}
.lb-status{font-size:11px;color:var(--gold-bright);margin-top:3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.fp-status{font-size:13px;color:var(--gold-bright);font-style:italic;margin-top:4px}
.status-edit{display:flex;gap:8px;margin-top:10px}
.status-edit input{flex:1;padding:12px 13px;border-radius:11px;background:var(--bg-3);border:1.5px solid var(--gold-deep);color:var(--text);font-size:14px;font-family:inherit}
.status-edit input:focus{outline:none;border-color:var(--gold)}
.status-edit button{padding:0 18px;border-radius:11px;background:var(--gold);border:none;color:#0a0e1a;font-weight:700;cursor:pointer;font-family:inherit}
.champ-pick select{width:100%;padding:13px 14px;border-radius:11px;background:var(--bg-3);border:1.5px solid var(--gold-deep);
  color:var(--text);font-family:'Tajawal';font-size:15px;font-weight:700;cursor:pointer}
.champ-pick select:focus{outline:none;border-color:var(--gold)}
.champ-locked{display:flex;align-items:center;gap:12px;background:var(--bg-3);border-radius:12px;padding:14px}
.champ-locked .cl-flag{font-size:38px}
.champ-locked .cl-name{font-family:'Cairo';font-weight:900;font-size:18px}
.champ-locked .cl-tag{font-size:11px;color:var(--gold-bright);font-weight:700;margin-top:2px}
.champ-none{color:var(--muted);font-size:13px;text-align:center;padding:6px}
/* بونص */
.bonus-row{display:flex;align-items:center;gap:10px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px}
.bonus-row .br-ico{font-size:22px;flex:none}
.bonus-row .br-t{flex:1;font-weight:700;font-size:13px}
.bonus-row .br-t small{display:block;color:var(--muted);font-weight:400;font-size:11px}
.bonus-row .br-v{font-family:'Anton';font-size:20px;color:var(--gold-bright);flex:none}

/* ترتيب المجموعات */
.toggle-wrap{display:flex;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:5px;gap:5px;margin-bottom:14px}
.toggle-btn{flex:1;padding:10px 6px;border:none;border-radius:9px;background:none;color:var(--muted);font-family:'Cairo';font-weight:700;font-size:12.5px;cursor:pointer;transition:all .2s;white-space:nowrap}
.toggle-btn.on{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#1a1405}
.toggle-btn.disabled{opacity:.5}
.real-note{text-align:center;color:var(--muted);font-size:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
.real-note b{color:var(--gold-bright)}
/* أفضل الثوالث */
.thirds-intro{background:var(--bg-2);border:1px solid var(--gold-deep);border-radius:12px;padding:12px 13px;font-size:12px;line-height:1.7;color:var(--muted);margin-bottom:12px}
.thirds-intro b{color:var(--gold-bright)}
.thirds-tbl{table-layout:auto}
.thirds-tbl th{font-size:10px}
.thirds-tbl td{padding:10px 4px;text-align:center}
.thirds-tbl .t-name{white-space:normal;width:auto;text-align:right}
.thirds-tbl tr.q td{background:rgba(47,191,113,.10)}
.thirds-tbl tr.o td{opacity:.5}
.thirds-tbl tr.cut td{border-bottom:2px solid var(--bad)}
.th-rank{font-family:'Anton';font-size:14px;color:var(--muted-2)}
.th-ok{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--ok);color:#06210f;font-size:12px;font-family:'Anton'}
.th-grp{font-size:9px;color:var(--muted-2);background:var(--bg-3);border-radius:5px;padding:1px 5px;margin-inline-start:5px}
.thirds-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin:12px 2px 0;justify-content:center}
.thirds-legend span{display:flex;align-items:center;gap:5px}
.thirds-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.thirds-legend .tl-q{background:var(--ok)}.thirds-legend .tl-o{background:var(--muted-2)}
/* خارطة الأدوار الإقصائية */
.ko-champ{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--gold),var(--gold-deep));border-radius:18px;padding:22px 16px 18px;text-align:center;margin-bottom:14px;color:#1a1405}
.ko-champ .tricolor{position:absolute;top:0;left:0}
.ko-champ-fl{font-size:54px;line-height:1}
.ko-champ-t{font-family:'Cairo';font-weight:900;font-size:24px;margin-top:4px}
.ko-champ-s{font-size:13px;font-weight:700;margin-top:2px}
.ko-intro{background:var(--bg-2);border:1px solid var(--gold-deep);border-radius:12px;padding:11px 13px;font-size:12px;line-height:1.7;color:var(--muted);margin-bottom:10px}
.ko-round-h{font-family:'Cairo';font-weight:900;font-size:15px;color:var(--gold-bright);margin:18px 2px 9px;padding-bottom:7px;border-bottom:1px solid var(--line)}
.ko-card{position:relative;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:9px 12px 12px;margin-bottom:8px}
.ko-card.done{border-color:var(--gold-deep)}
.ko-card.livecard{border-color:var(--bad);box-shadow:0 0 0 1px rgba(230,29,37,.35)}
.ko-cap{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ko-stat{font-size:10px;font-weight:800;font-family:'Cairo';padding:2px 9px;border-radius:7px}
.ko-stat.asis{background:rgba(229,184,56,.16);color:var(--gold-bright)}
.ko-stat.sched{background:var(--bg-3);color:var(--muted)}
.ko-stat.live{background:var(--bad);color:#fff;animation:pulse 1.5s infinite}
.ko-stat.post{background:rgba(47,191,113,.16);color:var(--ok)}
.ko-mn{font-size:9px;color:var(--muted-2);font-family:'Anton'}
.ko-body{display:flex;align-items:center;gap:8px}
.ko-side{flex:1;display:flex;align-items:center;gap:7px;min-width:0}
.ko-side.b{flex-direction:row-reverse;text-align:left}
.ko-fl{font-size:22px;flex:none}
.ko-nm{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ko-nm.slot{color:var(--muted-2);font-style:italic;font-weight:500;font-size:11.5px}
.ko-nm.win{color:var(--gold-bright)}
.ko-mid{flex:none;min-width:54px;text-align:center}
.ko-sc{font-family:'Anton';font-size:18px;color:var(--text);letter-spacing:1px}
.ko-sc.live{color:var(--bad)}
.ko-sc .ko-d{color:var(--muted-2)}
.ko-vs{font-family:'Anton';font-size:13px;color:var(--muted-2)}
/* توقّع الإقصائيات */
.pred-modes{margin-bottom:12px}
.ko-pred{display:block}
.kop-round{font-size:11px;color:var(--gold-bright);font-weight:700;margin-bottom:10px;font-family:'Cairo'}
.kop-when{color:var(--muted-2);font-weight:500}
.kop-stage{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
.kop-lbl{font-size:12px;font-weight:700;color:var(--text);margin-bottom:9px}
.kop-lbl small{display:block;font-weight:500;color:var(--muted);font-size:10.5px;margin-top:2px}
.pen-btns{display:flex;gap:8px}
.pen-btn{flex:1;padding:11px 8px;border:1.5px solid var(--line);border-radius:10px;background:var(--bg-2);color:var(--text);font-family:'Cairo';font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.pen-btn .m-flag{font-size:18px}
.pen-btn.on{border-color:var(--gold);background:rgba(229,184,56,.14);color:var(--gold-bright)}
.ko-mt-round{font-size:11px;color:var(--gold-bright);font-weight:700;margin:2px 0 8px;font-family:'Cairo'}
.mt-pred-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mt-name.slot{color:var(--muted-2);font-style:italic;font-size:11px;font-weight:500}
/* بطاقات مباريات منتخبي */
.mtm{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px}
.mtm-top{margin-bottom:8px}
.mtm-st{font-size:10.5px;font-weight:700;font-family:'Cairo';padding:2px 8px;border-radius:20px}
.mtm-st.post{background:rgba(255,255,255,.06);color:var(--muted)}
.mtm-st.live{background:rgba(230,29,37,.16);color:#ff6b6b}
.mtm-st.pre{background:rgba(229,184,56,.1);color:var(--gold-bright)}
.mtm-body{display:flex;align-items:center;gap:8px}
.mtm-side{flex:1;display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;transition:all .15s}
.mtm-side.away{flex-direction:row-reverse;text-align:left}
.mtm-side .fl{font-size:22px}
.mtm-side .nm{font-size:13px;font-weight:600;color:var(--text)}
.mtm-side.me{background:rgba(229,184,56,.12);border:1px solid var(--gold-deep)}
.mtm-side.me .nm{color:var(--gold-bright);font-weight:800}
.mtm-side.w .nm{color:var(--ok)}
.mtm-side.l .nm{opacity:.6}
.mtm-mid{font-family:'Anton';font-size:18px;color:var(--text);min-width:60px;text-align:center}
.mtm-mid .d{color:var(--muted-2);font-size:14px}
.mtm-adv{display:block;font-family:'Cairo';font-size:9px;color:var(--ok);font-weight:700;margin-top:2px}
.mtm-pred{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
.mtm-pred .mtm-pts{font-family:'Anton';font-size:12px;padding:1px 7px;border-radius:6px}
.mtm-pts.p5{background:rgba(229,184,56,.18);color:var(--gold-bright)}
.mtm-pts.p3{background:rgba(60,172,59,.16);color:var(--ok)}
.mtm-pts.p2{background:rgba(123,160,91,.16);color:#9ac77e}
.mtm-pts.p0{background:rgba(230,29,37,.12);color:#ff6b6b}
.mtm-no{color:var(--muted-2);font-style:italic}
.gcard{background:var(--bg-2);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px}
.gcard-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gcard-let{font-family:'Anton';font-size:22px;color:var(--gold);background:rgba(212,169,60,.12);border:1px solid rgba(212,169,60,.3);border-radius:9px;padding:1px 12px}
.gcard-title{font-family:'Cairo';font-weight:900;font-size:14px}
.stbl{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.stbl th{font-family:'Cairo';font-weight:600;color:var(--muted);font-size:10px;padding:6px 3px;border-bottom:1px solid var(--line);text-align:center}
.stbl td{padding:8px 3px;text-align:center;border-bottom:1px solid rgba(35,44,71,.5)}
.stbl tr:last-child td{border-bottom:none}
.stbl .t-name{text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;font-size:13px;width:46%}
.stbl .t-name .fl{margin-left:5px}
.stbl tr.q1 td{background:rgba(47,191,113,.12)}
.stbl tr.q2 td{background:rgba(47,191,113,.06)}
.stbl tr.q3 td{background:rgba(212,169,60,.07)}
.stbl .pts{font-family:'Anton';font-size:15px;color:var(--gold-bright)}
.pos-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.dot-q{background:var(--ok)}.dot-t{background:var(--gold)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:12px}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

/* منتخبي */
.team-pick{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
.team-pick label{font-family:'Cairo';font-weight:700;font-size:13px;color:var(--muted);display:block;margin-bottom:8px}
.team-pick select{width:100%;padding:13px 14px;border-radius:11px;background:var(--bg-3);border:1.5px solid var(--line);
  color:var(--text);font-family:'Tajawal';font-size:15px;font-weight:700;cursor:pointer}
.team-pick select:focus{outline:none;border-color:var(--gold)}
.tcard{background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.tcard.q{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.tcard .tricolor{position:absolute;top:0;left:0}
.tcard-flag{font-size:54px;margin-top:6px}
.tcard-name{font-family:'Cairo';font-weight:900;font-size:22px;margin-top:4px}
.tcard-grp{color:var(--muted);font-size:13px;margin-top:2px}
.tcard-stats{display:flex;justify-content:center;gap:18px;margin-top:14px}
.tcard-stat{display:flex;flex-direction:column;gap:2px}
.tcard-stat .v{font-family:'Anton';font-size:24px;color:var(--gold-bright)}
.tcard-stat .l{font-size:11px;color:var(--muted)}
.tcard-badge{display:inline-block;margin-top:14px;padding:7px 18px;border-radius:99px;font-family:'Cairo';font-weight:800;font-size:13px}
.badge-q{background:rgba(47,191,113,.15);color:var(--ok);border:1px solid var(--ok)}
.badge-t{background:rgba(212,169,60,.15);color:var(--gold-bright);border:1px solid var(--gold)}
.badge-out{background:rgba(224,83,61,.13);color:var(--bad);border:1px solid var(--bad)}
.path-title{font-family:'Cairo';font-weight:900;font-size:16px;margin:18px 2px 12px;display:flex;align-items:center;gap:8px}
.note-box{background:var(--bg-2);border:1px dashed var(--line);border-radius:14px;padding:18px;text-align:center;color:var(--muted);font-size:14px;line-height:1.7}
.note-box b{color:var(--gold-bright)}
  border:1.5px solid var(--line);border-radius:9px;color:var(--text);-moz-appearance:textfield;appearance:textfield;padding:0}
.champ-banner{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1a1405;border-radius:16px;padding:20px;text-align:center;margin-top:14px}
.champ-banner .big{font-family:'Cairo';font-weight:900;font-size:20px}
.champ-banner .sub{font-size:13px;margin-top:4px;font-weight:700}

/* المباريات والنتائج */
.mt-card{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:11px;position:relative}
.mt-card.live{border-color:var(--bad);box-shadow:0 0 0 1px rgba(230,29,37,.4),0 0 22px rgba(230,29,37,.18)}
.mt-card.ksa{border-color:rgba(229,184,56,.5);background:linear-gradient(135deg,rgba(229,184,56,.06),var(--bg-2))}
.mt-card.ksa::before{content:attr(data-mybadge);position:absolute;top:-9px;left:14px;background:var(--gold);color:#1a1405;font-family:'Cairo';font-weight:800;font-size:10px;padding:2px 9px;border-radius:99px}
.mt-status{position:absolute;top:-9px;right:14px;font-family:'Cairo';font-weight:800;font-size:10px;padding:2px 9px;border-radius:99px}
.st-live{background:var(--bad);color:#fff;animation:pulse 1.5s infinite}
.st-post{background:var(--bg-3);color:var(--muted);border:1px solid var(--line)}
.st-pre{background:var(--bg-3);color:var(--gold-bright);border:1px solid var(--line)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.mt-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.mt-side{flex:1;display:flex;align-items:center;gap:7px;min-width:0}
.mt-side.away{flex-direction:row-reverse;text-align:left}
.mt-flag{font-size:24px;flex:none}
.mt-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mt-scores{display:flex;flex-direction:column;align-items:center;gap:3px;flex:none;min-width:62px}
.mt-actual{font-family:'Anton';font-size:22px;color:var(--text);letter-spacing:1px}
.mt-actual .nogame{color:var(--muted-2);font-size:14px;font-family:'Tajawal'}
.mt-pred{font-size:11px;color:var(--muted)}
.mt-pred b{color:var(--gold-bright)}
.acc{display:inline-block;font-family:'Cairo';font-weight:800;font-size:10px;padding:1px 7px;border-radius:99px;margin-top:2px}
.acc5{background:rgba(47,191,113,.18);color:var(--ok)}
.acc3{background:rgba(47,191,113,.12);color:var(--ok)}
.acc2{background:rgba(232,181,58,.15);color:var(--warn)}
.acc0{background:rgba(224,83,61,.13);color:var(--bad)}
.mt-events{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line)}
.mt-col{display:flex;flex-direction:column;gap:5px;min-width:0}
.mt-col.away{align-items:flex-end}
.ev{font-size:11px;color:var(--text);display:flex;align-items:center;gap:5px;line-height:1.3;max-width:100%}
.mt-col.away .ev{flex-direction:row-reverse;text-align:left}
.ev-ico{flex:none}
.ev-min{color:var(--muted-2);font-family:'Anton';font-size:10px;flex:none}
.ev-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ev-assist{color:var(--muted-2);font-size:10px}
.ev-out{color:var(--bad)}
.ev-og{color:var(--bad);font-weight:800;font-size:9px;background:rgba(224,83,61,.13);padding:0 4px;border-radius:4px}
.ev.owngoal .ev-txt{color:var(--bad)}
.mt-tz{font-size:11px;color:var(--muted);text-align:center;margin-top:8px}
.mt-empty-ev{grid-column:1/-1;text-align:center;color:var(--muted-2);font-size:11px;padding:4px}

/* نقاطي */
.pts-hero{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1a1405;border-radius:18px;padding:22px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.pts-hero .big{font-family:'Anton';font-size:56px;line-height:1}
.pts-hero .lbl{font-family:'Cairo';font-weight:800;font-size:14px;margin-top:2px}
.pts-hero .sub{font-size:12px;margin-top:8px;font-weight:700;opacity:.85}
.pts-break{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.brk{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:11px 6px;text-align:center}
.brk .n{font-family:'Anton';font-size:22px}
.brk .t{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600}
.brk.b5 .n{color:var(--ok)}.brk.b3 .n{color:var(--ok)}.brk.b2 .n{color:var(--warn)}.brk.b0 .n{color:var(--bad)}
.sec-title{font-family:'Cairo';font-weight:900;font-size:15px;margin:18px 2px 10px;display:flex;align-items:center;gap:8px}
.heat{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:14px}
.hcell{aspect-ratio:1;border-radius:5px;background:var(--bg-3);border:1px solid var(--line)}
.hcell.h5{background:var(--gold);border-color:var(--gold-bright)}
.hcell.h3{background:var(--ok);border-color:var(--ok)}
.hcell.h2{background:#7BA05B;border-color:#7BA05B}
.hcell.h0{background:var(--bad);border-color:var(--bad)}
.hcell.hp{background:var(--bg-3);border-color:var(--gold-deep)}
.heat-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:10px}
.heat-legend span{display:flex;align-items:center;gap:5px}
.heat-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.hl-card{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.hl-card .hl-badge{font-family:'Anton';font-size:13px;color:#1a1405;background:var(--gold);border-radius:7px;padding:2px 8px;flex:none}
.hl-teams{flex:1;font-size:13px;font-weight:700;min-width:0}
.hl-sc{font-family:'Anton';font-size:15px;color:var(--gold-bright);flex:none}
.pts-note{text-align:center;color:var(--muted);font-size:13px;padding:30px 16px;line-height:1.7}
.pts-rules{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:16px;font-size:12px;color:var(--muted);line-height:1.9}
.pts-rules b{color:var(--gold-bright)}

/* الإحصائيات */
.stat-totals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
.stot{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px 6px;text-align:center}
.stot .n{font-family:'Anton';font-size:22px;color:var(--gold-bright)}
.stot .t{font-size:10px;color:var(--muted);margin-top:2px}
.stat-row{display:flex;align-items:center;gap:10px;background:var(--bg-2);border:1px solid var(--line);border-radius:11px;padding:10px 13px;margin-bottom:7px}
.stat-rank{font-family:'Anton';font-size:16px;color:var(--muted-2);min-width:22px;text-align:center}
.stat-rank.top{color:var(--gold-bright)}
.stat-flag{font-size:22px;flex:none}
.stat-name{flex:1;font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-team{font-size:11px;color:var(--muted);font-weight:400}
.stat-val{font-family:'Anton';font-size:18px;color:var(--gold-bright);flex:none}
.stat-val small{font-family:'Tajawal';font-size:11px;color:var(--muted)}
.stat-cards{display:flex;gap:8px;flex:none;align-items:center}
.cardpill{display:flex;align-items:center;gap:3px;font-family:'Anton';font-size:18px;color:var(--gold-bright)}
.susp-warn{display:inline-block;flex:none;font-family:'Cairo';font-weight:800;font-size:9px;padding:1px 7px;border-radius:99px;margin-inline-start:6px;background:rgba(232,181,58,.16);color:var(--warn);border:1px solid rgba(232,181,58,.4);white-space:nowrap}
/* النتيجة الحقيقية تحت التوقّع */
.m-result{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:12px;padding:11px 14px;background:var(--bg-3);border:1px solid var(--line);border-radius:11px;flex-wrap:wrap}
.m-result.live{border-color:#E5484D;background:linear-gradient(135deg,rgba(229,72,77,.12),var(--bg-3))}
.m-result .mr-lbl{font-size:12px;color:var(--muted)}
.m-result .mr-score{font-family:'Anton';font-size:22px;color:#fff;letter-spacing:1px}
.m-result .mr-score .d{color:var(--muted-2)}
.m-result .mr-pts{font-family:'Cairo';font-weight:800;font-size:13px;padding:3px 11px;border-radius:99px}
.mr-pts.p5{background:rgba(52,199,111,.18);color:#5BCB86;border:1px solid rgba(52,199,111,.45)}
.mr-pts.p3{background:rgba(229,184,56,.18);color:var(--gold-bright);border:1px solid rgba(229,184,56,.45)}
.mr-pts.p2{background:rgba(154,162,192,.16);color:var(--muted);border:1px solid var(--line)}
.mr-pts.p0{background:rgba(229,72,77,.14);color:#E5777A;border:1px solid rgba(229,72,77,.35)}
/* بطاقة المباراة السابقة (نظيفة) */
.pcard{padding:16px 16px 14px}
.pc-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pc-score{font-family:'Anton';font-size:30px;color:#fff;letter-spacing:1px;flex:none;min-width:96px;text-align:center}
.pc-score .d{color:var(--muted-2);font-size:24px;margin:0 2px}
.pc-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:13px;padding-top:12px;border-top:1px solid var(--line)}
.pc-pred{font-size:13px;color:var(--muted)}
.pc-pred b{color:var(--text);font-family:'Anton';font-size:15px;letter-spacing:.5px}
.pcard.jok{border-color:var(--gold-deep)}
.susp-ban{background:rgba(224,83,61,.16);color:var(--bad);border-color:rgba(224,83,61,.4)}
.cards-note{background:var(--bg-2);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;margin:6px 2px 14px;font-size:11px;color:var(--muted);line-height:1.7}
.cards-note b{color:var(--gold-bright)}
.cards-note .yw{color:var(--warn);font-weight:800}
.stat-empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 16px;line-height:1.7}
/* جوائز التوقّعات */
.award{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:9px}
.award .aw-ico{font-size:30px;flex:none;width:42px;text-align:center}
.award .aw-info{flex:1;min-width:0}
.award .aw-t{font-family:'Cairo';font-weight:800;font-size:14px;color:var(--gold-bright)}
.award .aw-sub{font-size:11px;color:var(--muted);margin-top:1px}
.award .aw-win{text-align:left;flex:none}
.award .aw-name{font-weight:800;font-size:14px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.award .aw-val{font-family:'Anton';font-size:15px;color:var(--gold-bright);margin-top:1px}
.gstat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:4px}
.gstat{background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:14px 8px;text-align:center}
.gstat .gs-n{font-family:'Anton';font-size:28px;color:var(--gold-bright);line-height:1}
.gstat .gs-t{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.3}

.pager button.on{background:var(--gold);color:#1a1405;border-color:var(--gold-bright)}
.pager button:disabled{opacity:.35;cursor:not-allowed}
.pager .pg-arrow{font-family:'Tajawal';font-weight:700}
.subtabs{display:flex;gap:8px;margin-bottom:14px;position:sticky;top:0;z-index:10;padding:4px 0;background:linear-gradient(var(--bg) 60%,transparent)}
.subtab{flex:1;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--bg-2);color:var(--muted);
  font-family:'Cairo';font-weight:800;font-size:13px;cursor:pointer;text-align:center;transition:all .2s}
.subtab.on{background:var(--gold);color:#1a1405;border-color:var(--gold-bright)}
.subtab .cnt{font-family:'Anton';font-size:11px;opacity:.8;margin-inline-start:4px}
.totop{position:fixed;bottom:18px;left:18px;z-index:50;width:46px;height:46px;border-radius:50%;
  background:var(--gold);color:#1a1405;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);
  display:none;align-items:center;justify-content:center;font-weight:900}
.totop.show{display:flex}

/* لوحة الترتيب */
.lb-row{display:flex;align-items:center;gap:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:border-color .2s}
.lb-row:active{transform:scale(.99)}
.lb-row.me{border-color:var(--gold);background:linear-gradient(135deg,rgba(229,184,56,.07),var(--bg-2))}
.lb-row.top1{border-color:var(--gold)}
.lb-rank{font-family:'Anton';font-size:20px;min-width:30px;text-align:center;color:var(--muted-2)}
.lb-rank.g{color:var(--gold-bright)}
.lb-medal{font-size:20px;min-width:30px;text-align:center}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-name .youtag{font-size:10px;color:var(--gold-bright);font-weight:700;margin-inline-start:5px}
.lb-sub{font-size:11px;color:var(--muted);margin-top:1px}
.lb-pts{font-family:'Anton';font-size:24px;color:var(--gold-bright);flex:none}
.lb-pts small{font-family:'Tajawal';font-size:11px;color:var(--muted)}
.lb-arrow{color:var(--muted-2);flex:none;font-size:16px}
.lb-empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 16px;line-height:1.8}
/* عرض توقّعات صديق */
.fp-head{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
.fp-back{background:var(--bg-3);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:8px 14px;font-family:'Tajawal';font-weight:700;font-size:13px;cursor:pointer;flex:none}
.fp-name{font-family:'Cairo';font-weight:900;font-size:18px;flex:1}
.fp-name .sub{font-size:12px;color:var(--muted);font-weight:400;margin-top:2px}
.fp-pts{font-family:'Anton';font-size:26px;color:var(--gold-bright);flex:none}

/* حالة فاضية */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-26{font-family:'Anton';font-size:70px;color:var(--line);line-height:1}
.empty-title{font-family:'Cairo';font-weight:900;font-size:20px;color:var(--text);margin-top:8px}
.empty-text{font-size:14px;margin-top:8px;line-height:1.7;max-width:280px;margin-inline:auto}
.empty-badge{display:inline-block;margin-top:16px;padding:7px 16px;border-radius:999px;background:var(--bg-3);border:1px solid var(--line);color:var(--gold-bright);font-size:12px;font-weight:700}

.save-pill{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--bg-3);border:1px solid var(--gold);
  color:var(--text);padding:9px 18px;border-radius:99px;font-weight:700;font-size:13px;opacity:0;transition:all .3s;z-index:90;pointer-events:none}
.save-pill.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* الإعلانات */
.ann-overlay{position:fixed;inset:0;z-index:200;background:rgba(4,6,14,.82);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px}

.ann-box{width:100%;max-width:430px;background:linear-gradient(160deg,var(--bg-2),var(--bg-3));border:1px solid var(--gold);border-radius:18px;overflow:hidden;animation:rise .4s;box-shadow:0 20px 60px rgba(0,0,0,.55)}
.ann-top{background:linear-gradient(180deg,var(--gold),var(--gold-deep));color:#1a1405;padding:14px 18px;font-family:'Cairo';font-weight:900;font-size:16px;display:flex;align-items:center;gap:8px}

function koPenWinner(rec,a,b){

function koActual(a,b){

      const forA=e.kind==='owngoal'?(e.team===b):(e.team===a);if(forA)oh++;else oa++;});}
  let decided,pw=null;
  if(fhs!==fas){decided=(oh!=null&&oh===oa)?'extra':'orig';}
  else{decided='pen';pw=koPenWinner(rec,a,b);}

}

function scoreKO(pred,act){
  if(!pred||!act)return 0;
  const phs=numKN(pred.hs),pas=numKN(pred.as);
  if(phs==null||pas==null)return 0;
  const predOrigDraw=(phs===pas);
  if(act.decided==='orig'){if(predOrigDraw)return 0;return scorePred(phs,pas,act.oh,act.oa)||0;}
  if(!predOrigDraw)return 0; // توقّعت حسم بالأصلي بس راحت لإضافي/ترجيح
  const origExact=(phs===act.oh);
  if(act.decided==='extra'){
    const peh=numKN(pred.ehs),pea=numKN(pred.eas);
    if(peh==null||pea==null)return origExact?2:1;
    const pW=peh>pea?'h':peh<pea?'a':'d';
    if(pW==='d')return origExact?3:2;
    const aW=act.eh>act.ea?'h':'a';
    if(pW!==aW)return origExact?3:2;
    const extraExact=(peh===act.eh&&pea===act.ea);
    if(origExact&&extraExact)return 8;
    if(origExact)return 6;
    return 5;
  }
  if(act.decided==='pen'){
    const peh=numKN(pred.ehs),pea=numKN(pred.eas);
    if(peh==null||pea==null)return origExact?2:1;
    if(peh!==pea)return origExact?3:2;
    const penRight=(pred.pen===act.pw);
    if(origExact&&penRight)return 10;
    if(origExact||penRight)return 8;
    return 6;
  }
  return 0;
}

  savedKO=JSON.parse(JSON.stringify(state.ko||{}));

async function saveState(){
  GM.forEach(m=>{
    if(matchStarted(m)){
      if(savedG[m.id]!==undefined) state.g[m.id]=savedG[m.id];
      else delete state.g[m.id];
    }
  });
  // حماية الإقصائيات المبدوءة محلياً (الباك يحمي أيضاً، هذا يمنع عدم التطابق)
  const _KO=computeKOReal();
  for(let m=73;m<=104;m++){
    const t=_KO.teamsOf[m]||{};

    savedG=JSON.parse(JSON.stringify(state.g||{}));
    savedKO=JSON.parse(JSON.stringify(state.ko||{}));

function evIcon(k){return {goal:"⚽",owngoal:"⚽",yellow:"🟨",red:"🟥",yellowred:"🟥",sub:"🔄"}[k]||"•";}
function evLabel(ev){
  const p=(ev.players||[]).map(esc);
  if(ev.kind==="sub")return `${p[1]||"?"} <span class="ev-out">←</span> ${p[0]||"?"}`;
  if(ev.kind==="owngoal")return `${p[0]||""} <span class="ev-og">عكسي</span>`;
  if(ev.kind==="goal")return p[0]+(p[1]?` <span class="ev-assist">(${p[1]})</span>`:"");

}
// نقاط التوقّع (Kicktipp): مطابق=5، فارق+فائز=3، تعادل مختلف=3، اتجاه صحيح=2، خطأ=0
function scorePred(ph,pa,ah,aa){
  if(ph==null||pa==null||ah==null||aa==null||ph===""||pa==="")return null;
  ph=+ph;pa=+pa;ah=+ah;aa=+aa;
  if(ph===ah&&pa===aa)return 5;
  const pd=Math.sign(ph-pa),ad=Math.sign(ah-aa);
  if(pd!==ad)return 0;
  if(pd===0)return 3;
  if((ph-pa)===(ah-aa))return 3;
  return 2;
}
function accBadge(pts){
  if(pts===5)return '<span class="acc acc5">🎯 +5</span>';
  if(pts===3)return '<span class="acc acc3">🟢 +3</span>';
  if(pts===2)return '<span class="acc acc2">🟡 +2</span>';
  if(pts===0)return '<span class="acc acc0">🔴 +0</span>';
  return '';
}

  if(rec&&(rec.status==='in'||rec.status==='post'))return true;
  const md=matchDate(m.tm);
  return md?Date.now()>=md.getTime():false;
}

// نقاط فيفا الرسمية — نشرة 11 يونيو 2026 (نقطة الانطلاق الثابتة)
const FIFA0={
  MEX:1687,RSA:1428,KOR:1592,CZE:1506, CAN:1559,SUI:1650,QAT:1450,BIH:1387,
  BRA:1766,MAR:1755,SCO:1503,HAI:1293, USA:1671,PAR:1505,AUS:1579,TUR:1606,
  GER:1736,ECU:1599,CIV:1541,CUW:1295, NED:1754,JPN:1662,TUN:1476,SWE:1510,
  BEL:1742,EGY:1562,IRN:1620,NZL:1276, ESP:1875,URU:1673,KSA:1424,CPV:1371,
  FRA:1871,NOR:1557,SEN:1684,IRQ:1446, ARG:1877,AUT:1597,ALG:1571,JOR:1388,
  POR:1768,COL:1698,COD:1474,UZB:1459, ENG:1828,CRO:1715,GHA:1347,PAN:1539};
const FIFA_I=50; // أهمية مباريات دور المجموعات بكأس العالم
// التصنيف الحي: نبدأ من نشرة 11 يونيو ونطبّق معادلة SUM على كل مباراة منتهية بالترتيب الزمني
function fifaLiveRatings(){
  const r={};Object.keys(FIFA0).forEach(k=>r[k]=FIFA0[k]);
  const done=GM.filter(m=>{const rec=liveFor(m.A,m.B);return rec&&rec.status==='post';})
    .sort((a,b)=>sortKey(a.tm)-sortKey(b.tm));
  done.forEach(m=>{
    const rec=liveFor(m.A,m.B);const aS=scoreFor(rec,m.A),bS=scoreFor(rec,m.B);
    if(aS==null||bS==null)return;
    const pa=r[m.A],pb=r[m.B];if(pa==null||pb==null)return;
    const wa=aS>bS?1:(aS<bS?0:0.5);
    const wea=1/(1+Math.pow(10,(pb-pa)/600));
    const d=FIFA_I*(wa-wea);
    r[m.A]=pa+d;r[m.B]=pb-d; // متناظر تماماً
  });
  return r;
}
// نقاط السلوك (الكروت): أصفر −1 · إنذاران (أحمر غير مباشر) −3 · أحمر مباشر −4
function fifaConduct(){
  const c={};
  Object.values(live.matches||{}).forEach(rec=>{
    if(rec.status!=='post')return;
    (rec.events||[]).forEach(e=>{const t=e.team;if(!t)return;
      if(c[t]==null)c[t]=0;
      if(e.kind==='yellow')c[t]-=1;else if(e.kind==='yellowred')c[t]-=3;else if(e.kind==='red')c[t]-=4;});
  });
  return c;
}
// إحصائيات مجموعة من النتائج الحقيقية المنتهية
function realGroupStats(g){
  const teams=GROUPS[g];const st={};teams.forEach(k=>st[k]={k,pts:0,gf:0,ga:0,gd:0,pld:0});
  GM.forEach(m=>{if(m.g!==g)return;const rec=liveFor(m.A,m.B);if(!(rec&&rec.status==='post'))return;
    const aS=scoreFor(rec,m.A),bS=scoreFor(rec,m.B);if(aS==null||bS==null)return;
    st[m.A].gf+=aS;st[m.A].ga+=bS;st[m.B].gf+=bS;st[m.B].ga+=aS;st[m.A].pld++;st[m.B].pld++;
    if(aS>bS)st[m.A].pts+=3;else if(aS<bS)st[m.B].pts+=3;else{st[m.A].pts++;st[m.B].pts++;}});
  teams.forEach(k=>st[k].gd=st[k].gf-st[k].ga);
  return st;
}
// ترتيب أفضل الثوالث بالمعايير الخمسة الرسمية
function realThirds(){
  const ratings=fifaLiveRatings();const conduct=fifaConduct();const out=[];
  Object.keys(GROUPS).forEach(g=>{
    const st=realGroupStats(g);const teams=GROUPS[g];
    const anyPlayed=teams.some(k=>st[k].pld>0);if(!anyPlayed)return; // المجموعة ما بدأت
    // ترتيب المجموعة: نستخدم ترتيب ESPN لو متاح (يطبّق المواجهة المباشرة)، وإلا نحسب
    let order;const ls=live.standings[g];
    if(ls&&ls.length>=4&&ls.every(e=>e.code)){
      order=ls.slice().sort((x,y)=>(x.rank||9)-(y.rank||9)).map(e=>e.code);
    }else{
      order=teams.slice().sort((x,y)=>st[y].pts-st[x].pts||st[y].gd-st[x].gd||st[y].gf-st[x].gf||((ratings[y]||0)-(ratings[x]||0)));
    }
    const code=order[2];if(!code)return;const s=st[code];
    const allPlayed=teams.every(k=>st[k].pld>=3);
    out.push({code,g,pts:s.pts,gd:s.gd,gf:s.gf,pld:s.pld,conduct:conduct[code]||0,fifa:Math.round((ratings[code]||0)*100)/100,allPlayed});
  });
  // المعايير: نقاط ⬇ · فارق ⬇ · أهداف ⬇ · سلوك ⬇ (أقل كروت أفضل) · تصنيف فيفا الحي ⬇
  out.sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||b.conduct-a.conduct||b.fifa-a.fifa);
  return out;
}

function maxJokers(){return allGroupsDoneReal()?MAX_JOKERS_KO:MAX_JOKERS_BASE;}
const STREAK_BONUS=10;         // بونص كل 3 توقّعات مطابقة تماماً متتالية

function validJokers(g,ko){
  const e=[];
  if(g)GM.forEach(m=>{if(g[m.id]&&g[m.id].j&&counts(m)){const d=matchDate(m.tm);e.push({k:m.id,t:d?d.getTime():0});}});

  e.sort((a,b)=>a.t-b.t);
  return new Set(e.slice(0,maxJokers()).map(x=>x.k));
}
// عدد الجواكر المستخدمة فعلياً (مجموعات + إقصائيات)
function jokerCount(g,ko){
  let n=0;
  if(g)GM.forEach(m=>{if(g[m.id]&&g[m.id].j)n++;});

// البطل الحقيقي (الفائز بالنهائي م104) — يُحسب لاحقاً عند توفّر نتائج الإقصائيات
function actualChampion(){try{return computeKOReal().winnerOf[104]||null;}catch(e){return null;}}
function computePointsForG(g,champ,ko){
  let total=0,scored=0,exact=0,good=0,ok=0,wrong=0;
  let jokerBonus=0,streakBonus=0,bestStreak=0;const per={};
  const jok=validJokers(g,ko);
  let streak=0;
  GM.forEach(m=>{
    if(!counts(m))return; // مستثناة من الاحتساب (قبل بداية المنافسة)
    const pred=g[m.id];const rec=liveFor(m.A,m.B);
    if(!pred||!rec||rec.status!=='post')return;
    const aS=scoreFor(rec,m.A),bS=scoreFor(rec,m.B);
    if(aS==null||bS==null)return;
    const base=scorePred(pred.h,pred.a,aS,bS);
    if(base==null)return;
    let pts=base;
    if(jok.has(m.id)){pts=base*2;jokerBonus+=base;} // الجوكر يضاعف
    per[m.id]=pts;total+=pts;scored++;
    if(base===5)exact++;else if(base===3)good++;else if(base===2)ok++;else wrong++;
    // السلسلة: توقّع مطابق تماماً (base===5)
    if(base===5){streak++;if(streak>bestStreak)bestStreak=streak;
      if(streak%3===0){streakBonus+=STREAK_BONUS;total+=STREAK_BONUS;}}
    else streak=0;
  });
  // البطل
  let champBonus=0;const ac=actualChampion();
  if(champ&&ac&&champ===ac){champBonus=CHAMP_BONUS;total+=CHAMP_BONUS;}
  // أنماط التوقّع (من التوقّعات المحسوبة فقط — من قطر×سويسرا)
  let predTotal=0,bigBets=0,drawBets=0;
  GM.forEach(m=>{if(!counts(m))return;const r=g[m.id];if(filled(r)){predTotal++;
    if(((+r.h)+(+r.a))>=4)bigBets++;
    if(+r.h===+r.a)drawBets++;}});
  return {total,scored,exact,good,ok,wrong,per,jokerBonus,streakBonus,bestStreak,curStreak:streak,champBonus,champ:champ||null,predTotal,bigBets,drawBets};
}
function computePoints(){
  const r=computePointsForG(state.g,state.champion,state.ko);
  const rk=computePointsForKO(state.ko,null,state.g);
  r.koTotal=rk.total;r.koScored=rk.scored;r.koPer=rk.per;r.grandTotal=r.total+rk.total;
  r.jokerBonus=(r.jokerBonus||0)+(rk.jokerBonus||0); // جوكر تراكمي (مجموعات + إقصائيات)
  return r;
}
// نقاط الأدوار الإقصائية (من النتائج الحقيقية + توقّع اللاعب، مع الجوكر التراكمي)
function computePointsForKO(ko,KO,g){
  if(!ko)return {total:0,scored:0,per:{},jokerBonus:0};
  KO=KO||computeKOReal();
  const jok=validJokers(g,ko);
  let total=0,scored=0,jokerBonus=0;const per={};
  for(let m=73;m<=104;m++){
    const t=KO.teamsOf[m];if(!t||!t.a||!t.b)continue;
    const act=koActual(t.a,t.b);if(!act)continue;
    const pred=ko[m];if(!pred)continue;
    let pts=scoreKO(pred,act);
    if(jok.has('ko'+m)){jokerBonus+=pts;pts*=2;} // الجوكر يضاعف
    per[m]=pts;total+=pts;if(pts>0)scored++;
  }
  return {total,scored,per,jokerBonus};
}

function dayPointsFor(g,day,koArg){
  if(!day)return 0;const dk=day.getMonth()+'-'+day.getDate();let tot=0;const jok=validJokers(g,koArg);
  GM.forEach(m=>{if(!counts(m))return;const d=matchDate(m.tm);if(!d)return;
    if((d.getMonth()+'-'+d.getDate())!==dk)return;
    const pred=g[m.id],rec=liveFor(m.A,m.B);if(!pred||!rec||rec.status!=='post')return;
    const aS=scoreFor(rec,m.A),bS=scoreFor(rec,m.B);if(aS==null||bS==null)return;
    let p=scorePred(pred.h,pred.a,aS,bS);if(p==null)return;
    if(jok.has(m.id))p*=2;tot+=p;});
  // الإقصائيات في نفس اليوم
  if(koArg){const KO=computeKOReal();
    for(let m=73;m<=104;m++){const ms=koKickoffMs(m);if(!ms)continue;const d=new Date(ms);
      if((d.getMonth()+'-'+d.getDate())!==dk)continue;
      const t=KO.teamsOf[m];if(!t||!t.a||!t.b)continue;const act=koActual(t.a,t.b);if(!act)continue;
      const pred=koArg[m];if(!pred)continue;let p=scoreKO(pred,act);
      if(jok.has('ko'+m))p*=2;tot+=p;}}
  return tot;}

function renderMatchesKOInto(host){

  for(let m=73;m<=104;m++){const t=KO.teamsOf[m];if(t&&t.a&&t.b&&(KO.allDone||koStartedM(m,t.a,t.b)))playable.push(m);}

function majorityFor(m){
  if(!boardData||!boardData.length)return null;
  let hw=0,dr=0,aw=0,tot=0,jokers=0;const sc={};
  boardData.forEach(p=>{const pr=p.g[m.id];if(!pr||pr.h===''||pr.h==null||pr.a===''||pr.a==null)return;
    tot++;const hh=+pr.h,aa=+pr.a;if(hh>aa)hw++;else if(aa>hh)aw++;else dr++;
    if(pr.j)jokers++;
    const k=hh+'-'+aa;sc[k]=(sc[k]||0)+1;});
  if(!tot)return null;
  const top=Math.max(hw,dr,aw);let lbl;
  if(hw===top)lbl='فوز '+nm(m.A);else if(aw===top)lbl='فوز '+nm(m.B);else lbl='تعادل';
  let ts=null,tn=0;Object.keys(sc).forEach(k=>{if(sc[k]>tn){tn=sc[k];ts=k;}});
  return {tot,lbl,pct:Math.round(top/tot*100),ts,tsPct:Math.round(tn/tot*100),jokers};
}
// عدد الجواكر على مباراة (يشتغل قبل البداية كمان — للتحميس)
function jokersOn(m){
  if(matchStarted(m)){
    if(!boardData||!boardData.length)return 0;
    let j=0;boardData.forEach(p=>{const pr=p.g[m.id];if(pr&&pr.j)j++;});
    return j;
  }
  return (upcomingJokers&&upcomingJokers[m.id])||0;
}
function matchCard(m){
  const A=m.A,B=m.B,rec=liveFor(A,B);
  const isKsa=(A===myTeam()||B===myTeam());
  const pred=state.g[m.id]||{};
  const status=rec?rec.status:'pre';
  const el=document.createElement('div');
  el.className='mt-card'+(status==='in'?' live':'')+(isKsa?' ksa':'');
  if(isKsa)el.setAttribute('data-mybadge',fl(myTeam())+' مباراتك');

  // شارة الحالة
  let badge='';
  if(status==='in')badge='<span class="mt-status st-live">🔴 جارية</span>';
  else if(status==='post')badge='<span class="mt-status st-post">انتهت</span>';
  else badge='<span class="mt-status st-pre">⏱ '+m.tm.t+'</span>';

  // النتيجة الحقيقية + التوقّع
  const started=(status==='in'||status==='post');
  const aS=scoreFor(rec,A),bS=scoreFor(rec,B);
  const hasActual=(started&&aS!=null&&bS!=null);
  let actualHtml=hasActual?`${aS} <span style="color:var(--muted-2)">−</span> ${bS}`:`<span class="nogame">— : —</span>`;
  const hasPred=(pred.h!==""&&pred.h!=null&&pred.a!==""&&pred.a!=null);
  let predHtml=hasPred?`🔮 توقّعك <b>${pred.h}-${pred.a}</b>`:'🔮 ما توقّعت';
  // دقّة التوقّع (لو المباراة خلصت)
  let acc='';
  if(status==='post'&&hasActual&&hasPred&&counts(m)){
    const pts=scorePred(pred.h,pred.a,aS,bS);acc=accBadge(pts);
  }
  // توقّع الأغلبية (للمباريات اللي بدأت فقط — منع التأثير على التوقّع)
  const maj=started?majorityFor(m):null;

  // شارة تحميس الجوكر: للمباريات اللي بتبدأ خلال ساعة (قبل القفل) وعليها جواكر
  let jokHype='';
  if(!started){

  }

  el.innerHTML=`${badge}
    <div class="mt-row">

    </div>${jokHype}${majHtml}`;

  // الأحداث (عمودين) لو فيه
  const evs=(rec&&rec.events)?rec.events:[];
  if(evs.length){
    const home=rec.home_code,away=rec.away_code;
    const colA=evs.filter(e=>evDisplayTeam(e,home,away)===A).sort((x,y)=>minVal(x.minute)-minVal(y.minute));
    const colB=evs.filter(e=>evDisplayTeam(e,home,away)===B).sort((x,y)=>minVal(x.minute)-minVal(y.minute));
    const renderCol=(arr,away)=>arr.map(e=>`<div class="ev ${esc(e.kind)}">

    const wrap=document.createElement('div');wrap.className='mt-events';
    wrap.innerHTML=`<div class="mt-col">${renderCol(colA,false)}</div><div class="mt-col away">${renderCol(colB,true)}</div>`;
    el.appendChild(wrap);
  }
  return el;
}

// بطاقة مباراة المنتخب (مشتركة): تمييز المنتخب + نتيجته + توقّعك
function mtmCard(A,B,team,badge,resTxt,predTxt,fin,aS,bS){
  let aCls='',bCls='';
  if(fin&&aS!=null&&bS!=null){if(aS>bS){aCls='w';bCls='l';}else if(bS>aS){bCls='w';aCls='l';}else{aCls=bCls='d';}}
  return `<div class="mtm">
    <div class="mtm-top">${badge}</div>
    <div class="mtm-body">
      <div class="mtm-side ${A===team?'me':''} ${aCls}"><span class="fl">${A?fl(A):'⚽'}</span><span class="nm">${A?nm(A):'?'}</span></div>
      <div class="mtm-mid">${resTxt}</div>
      <div class="mtm-side away ${B===team?'me':''} ${bCls}"><span class="fl">${B?fl(B):'⚽'}</span><span class="nm">${B?nm(B):'?'}</span></div>
    </div>
    ${predTxt?`<div class="mtm-pred">${predTxt}</div>`:''}
  </div>`;
}
function myTeamMatchRow(m,team){
  const rec=liveFor(m.A,m.B);const status=rec?rec.status:'pre';
  const aS=scoreFor(rec,m.A),bS=scoreFor(rec,m.B);
  const fin=status==='post',liveNow=status==='in';
  const pred=state.g[m.id]||{};const hasPred=filled(pred);
  const badge=fin?'<span class="mtm-st post">انتهت</span>':liveNow?'<span class="mtm-st live">🔴 جارية</span>':`<span class="mtm-st pre">${wdName(m.tm.m,m.tm.d)} ${m.tm.d}/${m.tm.m} · ${m.tm.t}</span>`;
  const resTxt=((fin||liveNow)&&aS!=null&&bS!=null)?`${aS} <span class="d">-</span> ${bS}`:'<span class="d">— : —</span>';
  let pts=(fin&&hasPred&&counts(m))?scorePred(pred.h,pred.a,aS,bS):null;
  const jok=hasPred&&pred.j&&validJokers(state.g,state.ko).has(m.id);
  if(pts!=null&&jok)pts*=2;
  const predTxt=hasPred?`🔮 توقّعك ${pred.h}-${pred.a}${jok?' 🃏':''}`+(pts!=null?` <span class="mtm-pts p${pts>=5?5:pts>=3?3:pts>=2?2:0}">+${pts}</span>`:''):(matchStarted(m)?'<span class="mtm-no">ما توقّعت</span>':'');
  return mtmCard(m.A,m.B,team,badge,resTxt,predTxt,fin,aS,bS);
}
function myTeamKORow(m,team,KO){
  const t=KO.teamsOf[m];const a=t.a,b=t.b;const sc=KO.scoreOf[m];
  const stt=koStatus(m,KO);
  const badge=`<span class="mtm-st ${stt.cls==='live'?'live':stt.cls==='post'?'post':'pre'}">${roundOf(m)} · ${stt.txt}${sc?'':' · '+koDateLabel(m)}</span>`;
  const resTxt=sc?`${sc.a} <span class="d">-</span> ${sc.b}`+(sc.status==='post'&&a&&b?winSuffix(m,a,b):''):'<span class="d">— : —</span>';
  const r=state.ko[m]||{};const has=v=>(v!=null&&v!=='');
  const act=(a&&b)?koActual(a,b):null;let pts=act?scoreKO(r,act):null;
  const jok=r.j&&validJokers(state.g,state.ko).has('ko'+m);
  if(pts!=null&&jok)pts*=2;
  const predTxt=(has(r.hs)&&has(r.as))?`🔮 توقّعك ${r.hs}-${r.as}${jok?' 🃏':''}`+(pts!=null?` <span class="mtm-pts p${pts>=8?5:pts>=5?3:pts>=2?2:0}">+${pts}</span>`:''):'';
  const fin=!!(sc&&sc.status==='post');
  return mtmCard(a,b,team,badge,resTxt,predTxt,fin,sc?sc.a:null,sc?sc.b:null);
}
function winSuffix(m,a,b){const w=computeKOReal().winnerOf[m];if(!w)return'';return w===a||w===b?` <span class="mtm-adv">${nm(w)} تأهّل ✅</span>`:'';}

  const ov=document.getElementById('adminOverlay');
